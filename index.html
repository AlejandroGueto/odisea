<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Odisea Educativa Premium - Edición Filológica Magistral</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.292.0?bundle"
        }
      }
    </script>

    <style>
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
      }
      .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
      
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      .animate-float { animation: float 3s ease-in-out infinite; }

      @keyframes float-note {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-30px) scale(1.5); opacity: 0; }
      }
      .animate-note { animation: float-note 2s ease-out infinite; }
      .animate-note-delayed { animation: float-note 2s ease-out 1s infinite; }
      
      .papyrus-bg {
        background-color: #eaddc5;
        background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
        color: #2c1810;
      }
      
      .table-greek { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
      .table-greek th { background-color: #1e293b; color: #fbbf24; padding: 10px; border: 1px solid #334155; font-weight: bold; text-align: center; }
      .table-greek td { padding: 8px 10px; border: 1px solid #334155; color: #cbd5e1; background-color: #0f172a; text-align: center; }
      .table-greek .highlight { color: #38bdf8; font-weight: bold; }
      .table-greek .highlight-alt { color: #f87171; font-weight: bold; }
      .table-greek tr:hover td { background-color: #1e293b; }
      
      .table-analysis { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.8rem; }
      .table-analysis th { background-color: #451a03; color: #fde68a; padding: 8px; border: 1px solid #78350f; font-weight: bold; text-align: center; }
      .table-analysis td { padding: 8px; border: 1px solid #78350f; color: #431407; background-color: #fef3c7; text-align: center; font-family: 'Palatino Linotype', serif; }
      .table-analysis tr:nth-child(even) td { background-color: #fde68a; }
      .table-analysis tr:hover td { background-color: #fcd34d; }

      .greek-font { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; line-height: 2.2; }

      .perspective-1000 { perspective: 1000px; }
      .transform-style-3d { transform-style: preserve-3d; }
      .backface-hidden { backface-visibility: hidden; }
      .rotate-y-180 { transform: rotateY(180deg); }

      .bg-stars {
        background-color: #020617;
        background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                          radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                          radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
        background-size: 550px 550px, 350px 350px, 250px 250px;
        background-position: 0 0, 40px 60px, 130px 270px;
      }

      .custom-scrollbar::-webkit-scrollbar { width: 8px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-amber-500/30 overflow-x-hidden relative">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { BookOpen, Key, Shield, Scroll, CheckCircle2, XCircle, ArrowRight, Anchor, Compass, Sparkles, AlertTriangle, Info, MessageCircle, Star, Crown, Eye, Flame, Feather, Volume2, Music, Layers, RefreshCcw, Navigation, Search, Map, Zap, Database, Activity, Calculator } from 'lucide-react';

        // --- COMPONENTES PREMIUM FUNDAMENTALES ---
        
        // 0. Componente Interactivo
        const InteractiveWord = ({ word, hint, type = "grammar" }) => (
          <span className="group relative inline-block cursor-help hover:text-amber-700 transition-colors border-b-2 border-dotted border-amber-900/70 hover:border-amber-700 px-1 font-bold">
            {word}
            <span className={`absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-max max-w-[280px] p-3 text-[14px] font-sans rounded-lg opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none shadow-[0_10px_30px_rgba(0,0,0,0.5)] leading-relaxed
              ${type === 'grammar' ? 'bg-slate-900 text-slate-100 border-l-4 border-blue-500' : 
                type === 'vocab' ? 'bg-slate-900 text-slate-100 border-l-4 border-emerald-500' : 
                'bg-slate-900 text-slate-100 border-l-4 border-amber-500'}`}>
              {hint}
            </span>
          </span>
        );

        const VideoIntro = () => (
          <div className="w-full max-w-4xl mx-auto rounded-3xl overflow-hidden shadow-[0_0_60px_rgba(217,119,6,0.3)] border-4 border-amber-600/50 mb-12 relative bg-slate-950 aspect-video group">
            <iframe className="absolute inset-0 w-full h-full" src="https://www.youtube.com/embed/ndj37zSR5Uo?autoplay=0&rel=0" title="Introducción a La Odisea" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowFullScreen></iframe>
          </div>
        );

        const Flashcard = ({ greek, spanish, type }) => {
          const [flipped, setFlipped] = useState(false);
          return (
            <div className="relative w-full h-36 cursor-pointer perspective-1000 group" onClick={() => setFlipped(!flipped)}>
              <div className={`w-full h-full transition-transform duration-500 transform-style-3d shadow-xl ${flipped ? 'rotate-y-180' : 'group-hover:-translate-y-2'}`}>
                <div className="absolute w-full h-full backface-hidden flex flex-col items-center justify-center bg-slate-800 border-2 border-slate-600 rounded-xl p-2">
                  <span className="text-2xl md:text-3xl font-serif text-amber-400 font-bold text-center">{greek}</span>
                  <span className="text-[10px] text-slate-400 mt-4 uppercase tracking-widest bg-slate-900 px-3 py-1.5 rounded-full shadow-inner"><RefreshCcw size={12} className="inline mr-1 mb-0.5"/> Girar</span>
                </div>
                <div className="absolute w-full h-full backface-hidden rotate-y-180 flex flex-col items-center justify-center bg-amber-900 border-2 border-amber-500/50 rounded-xl p-3 text-center shadow-inner">
                  <span className="text-sm md:text-lg font-black text-slate-100 uppercase tracking-wide leading-tight">{spanish}</span>
                  <span className="text-[10px] text-amber-200 mt-3 font-mono bg-black/40 px-3 py-1.5 rounded-full border border-amber-700/50">{type}</span>
                </div>
              </div>
            </div>
          );
        };

        const playLyreNote = (audioCtx, freq, time) => {
          const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
          osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, time);
          gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.3, time + 0.05); gain.gain.exponentialRampToValueAtTime(0.001, time + 1.5);
          osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 1.5);
        };

        const AedoPlayer = () => {
          const [isPlaying, setIsPlaying] = useState(false);
          const audioCtxRef = useRef(null);
          const togglePlay = () => {
            if (isPlaying) return;
            if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
            const ctx = audioCtxRef.current; if (ctx.state === 'suspended') ctx.resume();
            setIsPlaying(true);
            const melody = [329.63, 392.00, 349.23, 329.63, 293.66, 329.63, 440.00, 392.00, 349.23, 329.63, 293.66, 261.63, 293.66, 329.63, 329.63];
            let startTime = ctx.currentTime + 0.1;
            melody.forEach((freq, i) => { const delay = i > 8 ? 0.6 : 0.4; playLyreNote(ctx, freq, startTime); startTime += delay; });
            setTimeout(() => setIsPlaying(false), startTime * 1000 - ctx.currentTime * 1000 + 1000);
          };
          return (
            <div className="flex justify-center my-6 relative z-10">
              <button onClick={togglePlay} disabled={isPlaying} className={`flex items-center gap-3 px-8 py-3 rounded-full border-2 transition-all font-serif italic text-sm md:text-lg shadow-xl ${isPlaying ? 'bg-amber-200 text-amber-950 border-amber-500 scale-105' : 'bg-slate-900 text-amber-400 border-amber-600/50 hover:bg-slate-800 hover:border-amber-400'}`}>
                {isPlaying ? <Music className="animate-pulse text-amber-600" size={24} /> : <Volume2 size={24} />} {isPlaying ? 'El Aedo canta la epopeya...' : 'Escuchar la Lira del Aedo'}
              </button>
            </div>
          );
        };

        // --- HERRAMIENTAS EXCLUSIVAS (ISOPSEFÍA Y MÉTRICA) ---
        const IsopsephiaCalculator = () => {
            const [word, setWord] = useState('');
            const calculateValue = (str) => {
                const values = {'α':1,'β':2,'γ':3,'δ':4,'ε':5,'ζ':7,'η':8,'θ':9,'ι':10,'κ':20,'λ':30,'μ':40,'ν':50,'ξ':60,'ο':70,'π':80,'ρ':100,'σ':200,'ς':200,'τ':300,'υ':400,'φ':500,'χ':600,'ψ':700,'ω':800,'ά':1,'έ':5,'ή':8,'ί':10,'ό':70,'ύ':400,'ώ':800,'ᾶ':1,'ῆ':8,'ῖ':10,'ῦ':400,'ῶ':800,'ἀ':1,'ἐ':5,'ἠ':8,'ἰ':10,'ὀ':70,'ὐ':400,'ὠ':800,'ἁ':1,'ἑ':5,'ἡ':8,'ἱ':10,'ὁ':70,'ὑ':400,'ὡ':800};
                let total = 0; let breakdown = [];
                for (let char of str.toLowerCase()) { if (values[char]) { total += values[char]; breakdown.push(`${char}=${values[char]}`); } }
                return { total, breakdown };
            };
            const result = calculateValue(word);
            return (
                <div className="bg-slate-900 p-6 rounded-2xl border border-emerald-900/50 shadow-lg mt-6">
                    <h5 className="font-bold text-emerald-400 mb-4 flex items-center gap-2 border-b border-slate-800 pb-2"><Calculator size={20}/> El Ábaco de Pitágoras (Isopsefía)</h5>
                    <p className="text-sm text-slate-300 mb-4 leading-relaxed">Los antiguos griegos no tenían números arábigos; usaban su propio alfabeto para contar (α=1, ι=10, ρ=100...). Suma el valor místico de las letras de una palabra en griego antiguo.</p>
                    <div className="flex flex-col gap-4">
                        <input type="text" placeholder="Escribe en griego (ej. θεος)..." className="bg-slate-950 border border-slate-700 rounded-lg p-4 text-emerald-200 focus:outline-none focus:border-emerald-500 font-serif text-xl" value={word} onChange={(e) => setWord(e.target.value)} />
                        <div className="bg-slate-950/50 border border-slate-800 rounded-lg p-6 min-h-[120px] flex flex-col items-center justify-center shadow-inner">
                            {word ? (<><span className="font-mono text-5xl md:text-7xl text-emerald-400 font-bold tracking-widest text-center mb-4">{result.total}</span><span className="text-slate-500 font-mono text-sm break-words text-center">{result.breakdown.join(' + ')}</span></>) : (<span className="text-slate-600 italic">Esperando revelación numérica...</span>)}
                        </div>
                    </div>
                </div>
            );
        };

      const HomericScansion = () => {
            const [selectedVerse, setSelectedVerse] = useState(null);
            const verses = [
                { greek: "ἄνδρα μοι ἔννεπε, μοῦσα, πολύτροπον, ὃς μάλα πολλὰ", translation: "Háblame, Musa, de aquel varón de multiforme ingenio, que mucho...", scansion: "—  ∪  ∪  |  —  ∪  ∪  |  —  ∪  ∪  |  —  ∪  ∪  |  —  ∪  ∪  |  —  —", feet: ["Dáctilo", "Dáctilo", "Dáctilo", "Dáctilo", "Dáctilo", "Espondeo"] },
                { greek: "μῆνιν ἄειδε θεὰ Πηληϊάδεω Ἀχιλῆος", translation: "Canta, oh diosa, la cólera del Pélida Aquiles...", scansion: "—  ∪  ∪  |  —  ∪  ∪  |  —  —  |  —  ∪  ∪  |  —  ∪  ∪  |  —  —", feet: ["Dáctilo", "Dáctilo", "Espondeo", "Dáctilo", "Dáctilo", "Espondeo"] },
                { greek: "ὡς ἔφατ᾽, ἔδεισεν δ᾽ ὁ γέρων καὶ ἐπείθετο μύθῳ", translation: "Así habló; el anciano sintió miedo y obedeció la orden...", scansion: "—  ∪  ∪  |  —  —  |  —  ∪  ∪  |  —  ∪  ∪  |  —  ∪  ∪  |  —  —", feet: ["Dáctilo", "Espondeo", "Dáctilo", "Dáctilo", "Dáctilo", "Espondeo"] }
            ];
            return (
                <div className="bg-slate-900 p-6 rounded-2xl border border-purple-900/50 shadow-lg mt-6 text-center">
                    <h5 className="font-bold text-purple-400 mb-4 flex items-center justify-center gap-2"><Activity size={20}/> El Compás de las Musas (Métrica)</h5>
                    <p className="text-sm text-slate-300 mb-6 max-w-2xl mx-auto leading-relaxed">Toda la epopeya está forjada en <strong>hexámetros dactílicos</strong> (6 pies métricos). Analiza estos versos legendarios.</p>
                    <div className="flex flex-wrap gap-3 justify-center mb-6">
                        {verses.map((v, i) => (<button key={i} onClick={() => setSelectedVerse(v)} className={`px-4 py-2 rounded-lg text-sm border transition-all shadow-sm font-serif ${selectedVerse === v ? 'bg-purple-600 border-purple-400 text-white scale-105' : 'bg-slate-800 border-slate-600 text-purple-300 hover:bg-slate-700'}`}>Verso {i + 1}</button>))}
                    </div>
                    <div className="bg-slate-950 border-2 border-slate-800 rounded-xl flex flex-col items-center justify-center p-6 min-h-[160px] overflow-x-auto custom-scrollbar">
                        {selectedVerse ? (<div className="animate-in fade-in duration-500 w-max mx-auto"><span className="font-serif text-xl md:text-2xl text-amber-300 font-bold tracking-wider block mb-2">{selectedVerse.greek}</span><span className="text-slate-400 text-sm italic block mb-6">{selectedVerse.translation}</span><span className="font-mono text-xl md:text-2xl text-purple-400 font-black block mb-4 whitespace-pre text-center" style={{ wordSpacing: '0.2rem' }}>{selectedVerse.scansion}</span><div className="flex flex-wrap justify-center gap-2">{selectedVerse.feet.map((foot, idx) => (<span key={idx} className="bg-purple-900/50 text-purple-200 text-[10px] uppercase px-2 py-1 rounded border border-purple-500/30">Pie {idx+1}: {foot}</span>))}</div></div>) : (<span className="text-slate-600 italic">Selecciona un verso para invocar a la Musa Calíope</span>)}
                    </div>
                </div>
            );
        };
        
        const EpithetGenerator = () => {
            const [epithet, setEpithet] = useState(null);
            const generate = () => {
                const names = ['Ὀδυσσεὺς', 'Ἀχιλλεύς', 'Ἀγαμέμνων', 'Διομήδης', 'Ἕκτωρ', 'Αἴας', 'Νέστωρ', 'Πάτροκλος', 'Αἰνείας', 'Πάρις'];
                const prefixes = ['πολύμητις', 'ποδάρκης', 'ἄναξ ἀνδρῶν', 'βοὴν ἀγαθὸς', 'κορυθαίολος', 'πελώριος', 'ἱππότα', 'θεοῖς ἐπιείκελος', 'δῖος', 'ἀνδροφόνος'];
                const transNames = ['Odiseo', 'Aquiles', 'Agamenón', 'Diomedes', 'Héctor', 'Áyax', 'Néstor', 'Patroclo', 'Eneas', 'París'];
                const transPrefixes = ['el fecundo en ardides', 'el de los pies ligeros', 'el rey de hombres', 'el valiente en el grito de guerra', 'el de tremolante casco', 'el gigantesco', 'el domador de caballos', 'el semejante a los dioses', 'el divino', 'el matador de hombres'];
                const idxN = Math.floor(Math.random() * names.length); const idxP = Math.floor(Math.random() * prefixes.length);
                setEpithet({ greek: `${prefixes[idxP]} ${names[idxN]}`, trans: `${transNames[idxN]} ${transPrefixes[idxP]}` });
            };
            return (
                <div className="bg-slate-900 p-6 rounded-2xl border border-blue-900/50 shadow-lg mt-6 text-center">
                    <h5 className="font-bold text-blue-400 mb-4 flex items-center justify-center gap-2"><Zap size={20}/> La Forja de Homero (Fórmulas Épicas)</h5>
                    <p className="text-sm text-slate-300 mb-6 max-w-2xl mx-auto leading-relaxed">Genera combinaciones heroicas clásicas formadas por Sustantivo + Epíteto.</p>
                    <button onClick={generate} className="bg-blue-900/60 hover:bg-blue-800 text-blue-100 border border-blue-500/50 px-8 py-3 rounded-xl font-bold transition-all shadow-lg active:scale-95 mb-6 uppercase tracking-wider text-sm">Fundir Bronce y Epíteto</button>
                    <div className="bg-slate-950 border-2 border-slate-800 rounded-xl flex flex-col items-center justify-center p-6 min-h-[120px]">
                        {epithet ? (<div className="animate-in zoom-in duration-300"><span className="font-serif text-2xl md:text-3xl text-amber-400 font-bold tracking-wider block mb-2">{epithet.greek}</span><span className="text-slate-400 italic block">{epithet.trans}</span></div>) : (<span className="text-slate-600 italic">Pulsa el botón para invocar a las Musas</span>)}
                    </div>
                </div>
            );
        };

        const AnalizadorVerbos = () => {
          const [word, setWord] = useState('');
          
          // A ESTE DICCIONARIO DEBES AÑADIR LAS PALABRAS MANUALMENTE
          // Formato: 'palabraGriegaconAcentos': { raiz: '', aumento: '', desinencia: '', tiempo: '', voz: '', pers: '' }
          const lexicon = {
                'λύομαι': { raiz: 'λυ', aumento: '∅', desinencia: 'ομαι', tiempo: 'Presente', voz: 'Media', pers: '1ª Singular' },
                'ἔλυσαν': { raiz: 'λυ', aumento: 'ἐ', desinencia: 'σαν', tiempo: 'Aoristo Sigmático', voz: 'Activa', pers: '3ª Plural' },
                'ἐλίπομεν': { raiz: 'λιπ', aumento: 'ἐ', desinencia: 'ομεν', tiempo: 'Aoristo Fuerte', voz: 'Activa', pers: '1ª Plural' },
                'ἐποιήσαμεν': { raiz: 'ποιη', aumento: 'ἐ', desinencia: 'σαμεν', tiempo: 'Aoristo Contracto', voz: 'Activa', pers: '1ª Plural' },
                'λῦσον': { raiz: 'λυ', aumento: '∅', desinencia: 'σον', tiempo: 'Aoristo', voz: 'Activa', pers: '2ª Sg Imperativo' },
                'δεόμενος': { raiz: 'δε', aumento: '∅', desinencia: 'ομενος', tiempo: 'Presente (Participio)', voz: 'Media', pers: 'Nom. Sg. Masc.' },
                'ἔλυον': { raiz: 'λυ', aumento: 'ἐ', desinencia: 'ον', tiempo: 'Pret. Imperfecto', voz: 'Activa', pers: '1ª Sg / 3ª Pl' },
                'ἐλύετο': { raiz: 'λυ', aumento: 'ἐ', desinencia: 'ετο', tiempo: 'Pret. Imperfecto', voz: 'Media', pers: '3ª Singular' },
                'τιμῶμεν': { raiz: 'τιμα', aumento: '∅', desinencia: 'ομεν(ῶμεν)', tiempo: 'Presente Contracto', voz: 'Activa', pers: '1ª Plural' },
                'εἶδον': { raiz: 'ἰδ', aumento: 'εἰ (aum. temp)', desinencia: 'ον', tiempo: 'Aoristo Fuerte (ὁράω)', voz: 'Activa', pers: '1ª Sg / 3ª Pl' },
                'βούλεται': { raiz: 'βουλ', aumento: '∅', desinencia: 'εται', tiempo: 'Presente (Deponente)', voz: 'Media', pers: '3ª Singular' },
                'ἔλιπεν': { raiz: 'λιπ', aumento: 'ἐ', desinencia: 'εν', tiempo: 'Aoristo Fuerte', voz: 'Activa', pers: '3ª Singular' },
                'βαίνει': { raiz: 'βαιν', aumento: '∅', desinencia: 'ει', tiempo: 'Presente', voz: 'Activa', pers: '3ª Singular' },
                'κωλύει': { raiz: 'κωλυ', aumento: '∅', desinencia: 'ει', tiempo: 'Presente', voz: 'Activa', pers: '3ª Singular' },
                'ἔδωκαν': { raiz: 'δω/δο', aumento: 'ἔ', desinencia: 'καν', tiempo: 'Aoristo (Atemático)', voz: 'Activa', pers: '3ª Plural' },
                'ἤσθιον': { raiz: 'ἐσθι', aumento: 'ἠ (Temp)', desinencia: 'ον', tiempo: 'Pret. Imperfecto', voz: 'Activa', pers: '3ª Plural' },
                'ἐφίλουν': { raiz: 'φιλε', aumento: 'ἐ', desinencia: 'ουν (Contracto)', tiempo: 'Pret. Imperfecto', voz: 'Activa', pers: '3ª Plural' },
                'ἔμενον': { raiz: 'μεν', aumento: 'ἔ', desinencia: 'ον', tiempo: 'Pret. Imperfecto', voz: 'Activa', pers: '3ª Plural' },
                'ἔκλαιον': { raiz: 'κλαι', aumento: 'ἔ', desinencia: 'ον', tiempo: 'Pret. Imperfecto', voz: 'Activa', pers: '3ª Plural' },
                'σέβεται': { raiz: 'σεβ', aumento: '∅', desinencia: 'εται', tiempo: 'Presente (Deponente)', voz: 'Media', pers: '3ª Singular' },
                'ἐσθίει': { raiz: 'ἐσθι', aumento: '∅', desinencia: 'ει', tiempo: 'Presente', voz: 'Activa', pers: '3ª Singular' },
                'λαμβάνει': { raiz: 'λαμβαν', aumento: '∅', desinencia: 'ει', tiempo: 'Presente', voz: 'Activa', pers: '3ª Singular' },
                'βάλλει': { raiz: 'βαλλ', aumento: '∅', desinencia: 'ει', tiempo: 'Presente', voz: 'Activa', pers: '3ª Singular' },
                // === SUSTANTIVOS (NOMBRES) ===
                // Texto 1

                        {currentLevel.options.map((opt, idx) => (
                          <button key={idx} onClick={() => handleAnswer(opt)} disabled={feedback !== null} className={`w-full text-left p-6 md:p-8 rounded-2xl border-2 transition-all duration-300 flex items-center justify-between group shadow-lg ${feedback ? (opt.correct ? 'border-green-500 bg-green-900/40 text-green-200 shadow-[0_0_40px_rgba(34,197,94,0.4)] scale-[1.02]' : 'border-slate-800 bg-slate-950/80 text-slate-600 opacity-50 cursor-not-allowed') : 'border-slate-600 bg-slate-800/80 text-slate-200 hover:bg-slate-700 hover:border-amber-500 hover:text-amber-300 hover:shadow-[0_10px_30px_rgba(217,119,6,0.3)] hover:-translate-y-1'}`}>
                            <span className="pr-6 text-[15px] md:text-[19px] font-medium leading-relaxed block w-[90%]">{opt.text}</span>{!feedback && <div className="w-8 h-8 rounded-full border-2 border-slate-500 group-hover:border-amber-400 shrink-0 transition-colors bg-slate-900 shadow-inner"></div>}{feedback && opt.correct && <CheckCircle2 className="text-green-400 shrink-0 bg-green-950 rounded-full drop-shadow-lg" size={36} />}
                          </button>
                        ))}
                      </div>
                      {!feedback && (
                        <div className="mt-12 flex justify-center relative z-10">
                          <button onClick={() => setShowOracle(!showOracle)} className="flex items-center gap-3 text-sm md:text-lg font-bold text-purple-300 hover:text-white bg-purple-900/40 hover:bg-purple-800/60 px-10 py-5 rounded-full border-2 border-purple-600/50 transition-all shadow-[0_0_30px_rgba(168,85,247,0.3)] hover:shadow-[0_0_50px_rgba(168,85,247,0.6)] hover:scale-105 active:scale-95"><Eye size={24} className={showOracle ? "text-purple-400" : "animate-pulse text-purple-400"}/> {showOracle ? 'Ocultar Visión Profética' : 'Inhalar humo sagrado (Pista del Oráculo)'}</button>
                        </div>
                      )}
                      {showOracle && !feedback && (
                        <div className="mt-8 p-6 md:p-8 bg-gradient-to-b from-purple-950/80 to-purple-900/30 border border-purple-500/50 rounded-3xl text-purple-200 text-sm md:text-lg animate-in zoom-in duration-500 flex flex-col md:flex-row gap-5 md:gap-6 relative z-10 shadow-[inset_0_0_50px_rgba(168,85,247,0.2)]">
                          <div className="bg-purple-900/50 p-4 rounded-full h-max mx-auto md:mx-0 shadow-inner border border-purple-500/30"><Sparkles className="shrink-0 text-purple-300 animate-pulse" size={32}/></div>
                          <div className="text-center md:text-left pt-1"><span className="text-[10px] md:text-xs uppercase tracking-[0.2em] text-purple-400/80 block mb-2 font-black">La Pitia de Apolo sentencia:</span><strong className="text-[16px] md:text-xl font-serif font-medium leading-relaxed block">{currentLevel.oracleHint}</strong></div>
                        </div>
                      )}
                      {feedback && (
                        <div className={`mt-10 p-6 md:p-8 rounded-3xl flex flex-col md:flex-row items-center justify-center gap-4 md:gap-6 animate-in zoom-in-95 duration-500 border-2 relative z-10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] text-center md:text-left ${feedback.type === 'success' ? 'bg-gradient-to-r from-green-950 to-green-900/80 border-green-500 text-green-100' : 'bg-gradient-to-r from-red-950 to-red-900/80 border-red-500 text-red-100'}`}>
                          {feedback.type === 'success' ? <Sparkles className="shrink-0 text-green-400 animate-spin-slow" size={48}/> : <AlertTriangle className="shrink-0 text-red-400 animate-pulse" size={48}/>}<span className="font-black text-xl md:text-2xl tracking-wide">{feedback.text}</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {gameState === 'victory' && (
                  <div className="flex flex-col items-center justify-center py-10 md:py-24 animate-in zoom-in duration-1000">
                    <div className="w-56 h-56 md:w-80 md:h-80 relative mb-16 perspective-1000">
                      <div className="absolute inset-0 bg-amber-500 blur-[100px] opacity-60 rounded-full animate-pulse"></div>
                      <div className="absolute inset-0 border-[4px] border-amber-500/30 rounded-full animate-[spin_10s_linear_infinite] border-dashed"></div>
                      <div className="relative w-full h-full rounded-full border-[10px] border-amber-400 flex items-center justify-center bg-slate-900 shadow-[0_0_100px_rgba(217,119,6,0.9)] z-10 overflow-hidden transform-style-3d hover:rotate-y-180 transition-transform duration-1000">
                        <div className="absolute w-full h-full backface-hidden flex items-center justify-center"><Crown size={120} className="text-amber-400 drop-shadow-2xl relative z-20" /></div>
                        <div className="absolute w-full h-full backface-hidden rotate-y-180 flex items-center justify-center bg-amber-950"><Star size={100} className="text-amber-500 drop-shadow-2xl" /></div>
                      </div>
                    </div>
                    <h2 className="text-5xl md:text-[6rem] font-black text-center mb-6 text-transparent bg-clip-text bg-gradient-to-b from-amber-100 via-amber-300 to-amber-700 drop-shadow-[0_0_30px_rgba(217,119,6,0.8)] tracking-tighter uppercase leading-none">¡LA ODISEA HA TERMINADO!</h2>
                    <div className="bg-slate-900/90 border-4 border-amber-600/50 p-8 md:p-16 rounded-[3rem] shadow-[0_20px_60px_rgba(0,0,0,0.8)] max-w-4xl text-center leading-relaxed backdrop-blur-xl relative overflow-hidden">
                      <div className="absolute top-0 right-0 p-8 opacity-10"><Map size={150}/></div>
                      <div className="absolute bottom-0 left-0 p-8 opacity-10"><Anchor size={150}/></div>
                      <p className="mb-8 text-xl md:text-3xl text-slate-100 font-medium relative z-10 leading-relaxed">Habéis cruzado el implacable mar Egeo, burlado la furia del Oscuro Poseidón, masacrado a los soberbios pretendientes y recuperado el amor y el Oikos.</p>
                      <p className="mb-12 text-amber-400/90 italic font-serif text-2xl md:text-4xl border-y-2 border-amber-900/50 py-8 relative z-10 drop-shadow-md">"¡Que las Musas canten eternamente la excelencia morfológica y sintáctica de estos valientes filólogos!"</p>
                      <div className="mb-14 bg-slate-950/80 p-8 md:p-10 rounded-[2rem] border-2 border-slate-700 shadow-inner relative z-10">
                        <h4 className="text-amber-500 font-black mb-10 uppercase tracking-[0.3em] text-sm md:text-lg flex items-center justify-center gap-4 border-b border-slate-700 pb-4"><Star size={24}/> Tesoro Filológico Recuperado <Star size={24}/></h4>
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 justify-center">
                          {inventory.map((item, i) => (
                            <div key={i} className="flex flex-col items-center gap-3 bg-gradient-to-b from-slate-800 to-slate-900 p-4 md:p-6 rounded-2xl border border-slate-600/50 shadow-[0_10px_20px_rgba(0,0,0,0.5)] hover:-translate-y-3 hover:shadow-[0_20px_40px_rgba(217,119,6,0.4)] transition-all group">
                              <span className="text-4xl md:text-5xl drop-shadow-xl group-hover:scale-125 transition-transform">{item.icon}</span><span className="text-[10px] md:text-xs font-black text-amber-100 text-center uppercase tracking-widest">{item.name}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      <button onClick={() => window.location.reload()} className="bg-gradient-to-r from-amber-600 via-amber-500 to-amber-600 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-black px-12 md:px-16 py-6 md:py-8 rounded-2xl transition-all shadow-[0_0_40px_rgba(217,119,6,0.6)] hover:shadow-[0_0_60px_rgba(217,119,6,0.8)] hover:scale-105 active:scale-95 w-full md:w-auto text-xl md:text-2xl uppercase tracking-widest relative z-10">Reiniciar la Epopeya</button>
                    </div>
                  </div>
                )}
              </main>

              {gameState === 'playing' && (
                <div className="fixed bottom-0 left-0 right-0 bg-slate-950/95 backdrop-blur-xl border-t border-slate-800 p-3 z-30 shadow-[0_-10px_50px_rgba(0,0,0,0.8)]">
                  <div className="max-w-6xl mx-auto flex items-center gap-4 overflow-x-auto custom-scrollbar pb-2 pt-1">
                    <span className="text-amber-500 font-black uppercase tracking-[0.2em] text-xs shrink-0 flex items-center gap-2 border-r border-slate-700 pr-4 drop-shadow-md"><Key size={18}/> Tesoros:</span>
                    {inventory.length === 0 ? (
                      <span className="text-slate-500 text-sm font-medium italic px-2">Vuestras naves están vacías</span>
                    ) : (
                      inventory.map((item, idx) => (
                        <div key={idx} className="flex items-center gap-3 bg-gradient-to-r from-slate-900 to-slate-800 px-4 py-2 md:px-5 md:py-2.5 rounded-xl border border-amber-900/50 shrink-0 shadow-lg animate-in zoom-in hover:border-amber-500/50 transition-colors"><span className="text-xl md:text-2xl drop-shadow-md">{item.icon}</span><span className="text-[10px] md:text-xs font-bold text-amber-50 uppercase tracking-widest">{item.name}</span></div>
                      ))
                    )}
                  </div>
                </div>
              )}

              {isCodexOpen && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-2 sm:p-4 bg-slate-950/90 backdrop-blur-sm animate-in fade-in duration-300">
                  <div className="bg-[#0f172a] border-2 border-amber-500/60 rounded-[2rem] w-full max-w-[90rem] h-[95vh] flex flex-col shadow-[0_0_100px_rgba(217,119,6,0.4)] overflow-hidden relative">
                    <button onClick={() => setIsCodexOpen(false)} className="absolute top-4 right-4 z-50 text-slate-400 hover:text-white bg-slate-900 hover:bg-red-600 p-2 rounded-full transition-colors border border-slate-700 shadow-lg"><XCircle size={32} /></button>
                    <div className="flex justify-between items-center p-6 border-b border-slate-800 bg-slate-950 relative z-40">
                      <h2 className="text-xl md:text-3xl font-black text-amber-500 flex items-center gap-4 uppercase tracking-[0.2em] drop-shadow-md"><BookOpen className="text-amber-400" size={36}/> Biblioteca Filológica Alejandrina</h2>
                    </div>
                    <div className="flex flex-col md:flex-row flex-1 overflow-hidden relative z-10">
                      <div className="w-full md:w-80 lg:w-96 bg-[#020617] border-r border-slate-800 p-4 md:p-5 overflow-y-auto flex md:flex-col gap-3 shrink-0 scroll-smooth custom-scrollbar z-20 shadow-[5px_0_15px_rgba(0,0,0,0.5)]">
                        {Object.keys(CODEX_DATA).map(key => {
                          const isUnlocked = unlockedCodex.includes(key);
                          const isActive = activeTopic === key;
                          return (
                            <button key={key} onClick={() => isUnlocked && setActiveTopic(key)} className={`text-left px-5 py-4 md:py-5 rounded-2xl text-sm md:text-[15px] transition-all shrink-0 border-2 relative group overflow-hidden ${isActive ? 'bg-gradient-to-r from-slate-800 to-slate-900 border-amber-500 text-amber-400 shadow-[0_0_20px_rgba(217,119,6,0.3)] md:translate-x-2' : isUnlocked ? 'bg-slate-900 border-slate-800 hover:border-slate-600 text-slate-300 hover:bg-slate-800' : 'opacity-50 cursor-not-allowed bg-slate-950 border-slate-900 text-slate-600'}`}>
                              <div className="flex flex-col relative z-10"><span className="text-[10px] md:text-xs uppercase tracking-[0.25em] text-slate-500 mb-2 font-black">{CODEX_DATA[key].category}</span><div className="flex items-center gap-3 md:gap-4"><span className={isActive ? "text-amber-400" : isUnlocked ? "text-slate-400 group-hover:text-white transition-colors" : "text-slate-700"}>{isUnlocked ? CODEX_DATA[key].icon : <AlertTriangle size={24} />}</span><span className="font-black truncate block w-full tracking-wide">{CODEX_DATA[key].title}</span></div></div>{isActive && <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-amber-500 shadow-[0_0_15px_rgba(217,119,6,1)]"></div>}
                            </button>
                          );
                        })}
                      </div>
                      <div className="flex-1 p-6 md:p-14 overflow-y-auto scroll-smooth bg-slate-950 relative custom-scrollbar">
                        <div className="absolute inset-0 opacity-5 pointer-events-none flex items-center justify-center"><BookOpen size={800} /></div>
                        {activeTopic && CODEX_DATA[activeTopic] && (
                          <div className="relative z-10 animate-in fade-in slide-in-from-right-8 duration-500 max-w-5xl mx-auto pb-10">
                            <h3 className="text-3xl md:text-5xl font-black text-slate-50 mb-10 drop-shadow-md flex items-center gap-5 border-b-2 border-slate-800 pb-8 leading-tight"><span className="text-amber-500 p-4 bg-slate-900 rounded-2xl border-2 border-slate-700 shadow-lg">{CODEX_DATA[activeTopic].icon}</span>{CODEX_DATA[activeTopic].title}</h3>
                            <div className="text-slate-200">{CODEX_DATA[activeTopic].content}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const QuoteIcon = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"></path>
                <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.99c1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"></path>
            </svg>
        );

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
