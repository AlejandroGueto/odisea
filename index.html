<head>

    <style>
      @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }

      .papyrus-bg { background-color: #eaddc5; background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E"); color: #2c1810; }
      .table-greek { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }

      .table-analysis td { padding: 8px; border: 1px solid #78350f; color: #431407; background-color: #fef3c7; text-align: center; font-family: 'Palatino Linotype', serif; }

      .greek-font { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; line-height: 2.2; }
      .bg-stars { background-color: #020617; background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px), radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px); background-size: 550px 550px, 350px 350px, 250px 250px; background-position: 0 0, 40px 60px, 130px 270px; }
      .custom-scrollbar::-webkit-scrollbar { width: 8px; }

<body class="bg-slate-950 text-slate-200 font-sans selection:bg-amber-500/30 overflow-x-hidden relative">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { BookOpen, Key, Shield, Scroll, CheckCircle2, XCircle, ArrowRight, Anchor, Compass, Sparkles, AlertTriangle, Info, MessageCircle, Star, Crown, Eye, Feather, Volume2, Music, Layers, RefreshCcw, Navigation, Search, Map, Zap, Database, Activity, Calculator } from 'lucide-react';

        const InteractiveWord = ({ word, hint, type = "grammar" }) => (
          <span className="group relative inline-block cursor-help hover:text-amber-700 transition-colors border-b-2 border-dotted border-amber-900/70 hover:border-amber-700 px-1 font-bold">
            {word}
            <span className={`absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-max max-w-[280px] p-3 text-[14px] font-sans rounded-lg opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none shadow-[0_10px_30px_rgba(0,0,0,0.5)] leading-relaxed ${type === 'grammar' ? 'bg-slate-900 text-slate-100 border-l-4 border-blue-500' : type === 'vocab' ? 'bg-slate-900 text-slate-100 border-l-4 border-emerald-500' : 'bg-slate-900 text-slate-100 border-l-4 border-amber-500'}`}>
              {hint}
            </span>
          </span>
        );

        const VideoIntro = () => (
          <div className="w-full max-w-4xl mx-auto rounded-3xl overflow-hidden shadow-[0_0_60px_rgba(217,119,6,0.3)] border-4 border-amber-600/50 mb-12 relative bg-slate-950 aspect-video group">
            <iframe className="absolute inset-0 w-full h-full" src="https://www.youtube.com/embed/ndj37zSR5Uo?autoplay=0&rel=0" title="La Odisea" frameBorder="0" allowFullScreen></iframe>
          </div>
        );

        const playLyreNote = (audioCtx, freq, time) => {
          const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
          osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, time);
          gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.3, time + 0.05); gain.gain.exponentialRampToValueAtTime(0.001, time + 1.5);
          osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 1.5);
        };

        const AedoPlayer = () => {
          const [isPlaying, setIsPlaying] = useState(false);
          const audioCtxRef = useRef(null);
          const togglePlay = () => {
            if (isPlaying) return;
            if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
            const ctx = audioCtxRef.current; if (ctx.state === 'suspended') ctx.resume();
            setIsPlaying(true);
            const melody = [329.63, 392.00, 349.23, 329.63, 293.66, 329.63, 440.00, 392.00, 349.23, 329.63];
            let startTime = ctx.currentTime + 0.1;
            melody.forEach((freq) => { playLyreNote(ctx, freq, startTime); startTime += 0.4; });
            setTimeout(() => setIsPlaying(false), 4000);
          };
          return (
            <div className="flex justify-center my-6 relative z-10">
              <button onClick={togglePlay} disabled={isPlaying} className={`flex items-center gap-3 px-8 py-3 rounded-full border-2 transition-all font-serif italic text-sm shadow-xl ${isPlaying ? 'bg-amber-200 text-amber-950 border-amber-500 scale-105' : 'bg-slate-900 text-amber-400 border-amber-600/50 hover:bg-slate-800'}`}>
                {isPlaying ? <Music className="animate-pulse text-amber-600" size={24} /> : <Volume2 size={24} />} Escuchar la Lira del Aedo
              </button>
            </div>
          );
        };

        const IsopsephiaCalculator = () => {
            const [word, setWord] = useState('');
            const calculateValue = (str) => {
                const values = {'α':1,'β':2,'γ':3,'δ':4,'ε':5,'ζ':7,'η':8,'θ':9,'ι':10,'κ':20,'λ':30,'μ':40,'ν':50,'ξ':60,'ο':70,'π':80,'ρ':100,'σ':200,'ς':200,'τ':300,'υ':400,'φ':500,'χ':600,'ψ':700,'ω':800,'ά':1,'έ':5,'ή':8,'ί':10,'ό':70,'ύ':400,'ώ':800,'ᾶ':1,'ῆ':8,'ῖ':10,'ῦ':400,'ῶ':800,'ἀ':1,'ἐ':5,'ἠ':8,'ἰ':10,'ὀ':70,'ὐ':400,'ὠ':800,'ἁ':1,'ἑ':5,'ἡ':8,'ἱ':10,'ὁ':70,'ὑ':400,'ὡ':800};
                let total = 0; let breakdown = [];
                for (let char of str.toLowerCase()) { if (values[char]) { total += values[char]; breakdown.push(`${char}=${values[char]}`); } }
                return { total, breakdown };
            };
            const result = calculateValue(word);
            return (
                <div className="bg-slate-900 p-6 rounded-2xl border border-emerald-900/50 shadow-lg mt-6">
                    <h5 className="font-bold text-emerald-400 mb-4 flex items-center gap-2 border-b border-slate-800 pb-2"><Calculator size={20}/> El Ábaco de Pitágoras (Isopsefía)</h5>
                    <div className="flex flex-col gap-4">
                        <input type="text" placeholder="Escribe en griego..." className="bg-slate-950 border border-slate-700 rounded-lg p-4 text-emerald-200 focus:outline-none font-serif text-xl" value={word} onChange={(e) => setWord(e.target.value)} />
                        <div className="bg-slate-950/50 border border-slate-800 rounded-lg p-6 min-h-[100px] flex flex-col items-center justify-center">
                            {word ? (<><span className="font-mono text-5xl text-emerald-400 font-bold mb-2">{result.total}</span><span className="text-slate-500 font-mono text-xs">{result.breakdown.join(' + ')}</span></>) : (<span className="text-slate-600 italic">Suma el valor de las letras...</span>)}
                        </div>
                    </div>
                </div>
            );
        };

        const HomericScansion = () => {
            const [selectedVerse, setSelectedVerse] = useState(null);
            const verses = [
                { greek: "ἄνδρα μοι ἔννεπε, μοῦσα, πολύτροπον", translation: "Háblame, Musa, del varón de multiforme ingenio...", scansion: "—  ∪  ∪  |  —  ∪  ∪  |  —  ∪  ∪", feet: ["Dáctilo", "Dáctilo", "Dáctilo"] }
            ];
            return (
                <div className="bg-slate-900 p-6 rounded-2xl border border-purple-900/50 shadow-lg mt-6 text-center">
                    <h5 className="font-bold text-purple-400 mb-4 flex items-center justify-center gap-2"><Activity size={20}/> El Compás de las Musas (Métrica)</h5>
                    <button onClick={() => setSelectedVerse(verses[0])} className="px-4 py-2 rounded-lg text-sm border bg-slate-800 text-purple-300 mb-4">Ver Escansión</button>
                    {selectedVerse && (
                        <div className="bg-slate-950 border-2 border-slate-800 rounded-xl p-6">
                            <span className="font-serif text-xl text-amber-300 font-bold block mb-2">{selectedVerse.greek}</span>
                            <span className="font-mono text-2xl text-purple-400 font-black block mb-4">{selectedVerse.scansion}</span>
                        </div>
                    )}
                </div>
            );
        };

        const EpithetGenerator = () => {
            const [epithet, setEpithet] = useState(null);
            const generate = () => {
                const names = ['Ὀδυσσεὺς', 'Ἀχιλλεύς', 'Ἕκτωρ'];
                const prefixes = ['πολύμητις', 'ποδάρκης', 'κορυθαίολος'];
                const idxN = Math.floor(Math.random() * names.length);
                setEpithet(`${prefixes[idxN]} ${names[idxN]}`);
            };
            return (
                <div className="bg-slate-900 p-6 rounded-2xl border border-blue-900/50 shadow-lg mt-6 text-center">
                    <h5 className="font-bold text-blue-400 mb-4 flex items-center justify-center gap-2"><Zap size={20}/> Forja de Epítetos</h5>
                    <button onClick={generate} className="bg-blue-900/60 text-blue-100 px-8 py-3 rounded-xl font-bold mb-6 text-sm">Generar</button>
                    <div className="bg-slate-950 border-2 border-slate-800 rounded-xl p-6 min-h-[80px] flex items-center justify-center">
                        {epithet ? <span className="font-serif text-2xl text-amber-400 font-bold tracking-wider">{epithet}</span> : <span className="text-slate-600 italic">Pulsa para invocar...</span>}
                    </div>
                </div>
            );
        };
        const AnalizadorUniversal = () => {
          const [word, setWord] = useState('');
          const lexicon = {
                'λύομαι': { tipo: 'verbo', c1: 'Presente', c2: 'Media', c3: '1ª Sg', c4: 'λυ', c5: '∅', c6: 'ομαι' },
                'ἔλυσan': { tipo: 'verbo', c1: 'Aoristo', c2: 'Activa', c3: '3ª Pl', c4: 'λυ', c5: 'ἐ', c6: 'σαν' },
                'πόλεμον': { tipo: 'nombre', c1: 'Acusativo', c2: 'Masculino', c3: 'Singular', c4: 'πόλεμος', c5: '2ª Decl', c6: 'ον' },
                'ἀχαιοὶ': { tipo: 'nombre', c1: 'Nominativo', c2: 'Masculino', c3: 'Plural', c4: 'Ἀχαιός', c5: '2ª Decl', c6: 'οι' },
                'πλοῖα': { tipo: 'nombre', c1: 'Acusativo', c2: 'Neutro', c3: 'Plural', c4: 'πλοῖον', c5: '2ª Decl', c6: 'α' },
                'ὀδυσσεὺς': { tipo: 'nombre', c1: 'Nominativo', c2: 'Masculino', c3: 'Singular', c4: 'Ὀδυσσεύς', c5: '3ª Decl', c6: 'ς' },
                'θάλατταν': { tipo: 'nombre', c1: 'Acusativo', c2: 'Femenino', c3: 'Singular', c4: 'θάλαττα', c5: '1ª Decl', c6: 'αν' },
                'κύκλωψ': { tipo: 'nombre', c1: 'Nominativo', c2: 'Masculino', c3: 'Singular', c4: 'Κύκλωψ', c5: '3ª Decl', c6: 'ψ' },
                'μεγάλους': { tipo: 'nombre', c1: 'Acusativo', c2: 'Masculino', c3: 'Plural', c4: 'μέγας (Adj)', c5: '2ª Decl', c6: 'ους' }
          };
          const handleSearch = (e) => setWord(e.target.value.trim().toLowerCase());
          const result = lexicon[word] || null;
          return (
            <div className="bg-slate-950 border border-slate-700 p-6 rounded-xl mt-4 text-center">
              <input type="text" placeholder="Escribe con acentos (ej. πόλεμον)" className="w-full bg-slate-900 border-2 border-amber-600/50 rounded-xl py-3 px-4 text-amber-300 font-serif text-xl focus:outline-none" value={word} onChange={handleSearch} />
              {result && (
                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mt-6 animate-in zoom-in-95">
                  <div className="bg-slate-900 p-4 rounded-xl border-l-4 border-blue-500"><span className="text-[10px] text-slate-500 block uppercase">{result.tipo === 'verbo' ? 'Tiempo' : 'Caso'}</span><span className="text-blue-400 font-bold">{result.c1}</span></div>
                  <div className="bg-slate-900 p-4 rounded-xl border-l-4 border-purple-500"><span className="text-[10px] text-slate-500 block uppercase">{result.tipo === 'verbo' ? 'Voz' : 'Género'}</span><span className="text-purple-400 font-bold">{result.c2}</span></div>
                  <div className="bg-slate-900 p-4 rounded-xl border-l-4 border-emerald-500"><span className="text-[10px] text-slate-500 block uppercase">{result.tipo === 'verbo' ? 'Persona' : 'Número'}</span><span className="text-emerald-400 font-bold">{result.c3}</span></div>
                </div>
              )}
            </div>
          );
        };

        const DiccionarioEpico = () => {
          const [searchTerm, setSearchTerm] = useState('');
          const dictionary = [
            { word: 'ἄναξ, ἄνακτος (ὁ)', mean: 'Rey supremo, señor' },
            { word: 'γλαυκῶπις', mean: 'De ojos brillantes (Atenea)' },
            { word: 'πολύμηtiς', mean: 'De mucha astucia (Odiseo)' },
            { word: 'νόστος (ὁ)', mean: 'El viaje de regreso a casa' },
            { word: 'ὕβρις (ἡ)', mean: 'La soberbia, desmesura' },
            { word: 'ξενία (ἡ)', mean: 'Hospitalidad sagrada' },
            { word: 'κλέος (τό)', mean: 'Gloria eterna' },
            { word: 'οἶκος (ὁ)', mean: 'Casa, familia, patrimonio' }
          ];
          const filtered = dictionary.filter(item => item.word.toLowerCase().includes(searchTerm.toLowerCase()));
          return (
            <div className="bg-slate-950 border border-slate-700 p-5 rounded-xl mt-4">
              <input type="text" placeholder="Buscar..." className="w-full bg-slate-900 border-2 border-slate-600 rounded-xl py-3 px-4 text-amber-100 mb-6" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                {filtered.map((item, idx) => (
                  <div key={idx} className="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-md"><span className="text-amber-400 font-serif font-bold text-2xl block mb-2">{item.word}</span><span className="text-slate-300 text-sm">{item.mean}</span></div>
                ))}
              </div>
            </div>
          );
        };

        const WordAnalysisTable = ({ levelId }) => {
            const [isOpen, setIsOpen] = useState(false);
            const ANALYSIS_DATA = {
                1: [{w:"μετὰ",l:"μετά",m:"Prep",s:"Enlace",t:"después de"},{w:"τὸν",l:"ὁ",m:"Art Masc Acus Sg",s:"Det",t:"la"},{w:"πόλεμον",l:"πόλεμος",m:"Sust Masc Acus Sg",s:"CD",t:"guerra"}],
                2: [{w:"οἱ",l:"ὁ",m:"Art",s:"Det",t:"los"},{w:"ἑταῖροι",l:"ἑταῖρος",m:"Sust Nom Pl",s:"Suj",t:"compañeros"}],
                3: [{w:"Ὀδυσσεὺς",l:"Ὀδυσσεύς",m:"Sust Nom",s:"Suj",t:"Odiseo"},{w:"ὀφθαλμὸν",l:"ὀφθαλμός",m:"Sust Acus",s:"CD",t:"ojo"}],
                4: [{w:"ἄνεμοι",l:"ἄνεμος",m:"Sust Nom Pl",s:"Sujeto",t:"vientos"}],
                5: [{w:"λίθους",l:"λίθος",m:"Sust Acus Pl",s:"CD",t:"piedras"}],
                6: [{w:"Κίρκη",l:"Κίρκη",m:"Sust Nom",s:"Sujeto",t:"Circe"}],
                7: [{w:"Ἅιδην",l:"Ἅιδης",m:"Sust Acus",s:"CC",t:"Hades"}],
                8: [{w:"βούλεται",l:"βούλομαι",m:"Vb Pres Medio",s:"N",t:"quiere"}],
                9: [{w:"ἔχουσα",l:"ἔχω",m:"Part Pres Act",s:"Ady",t:"teniendo"}],
                10: [{w:"κάθηται",l:"κάθημαι",m:"Vb Pres Medio",s:"N",t:"está sentado"}],
                11: [{w:"ἔφυγον",l:"φεύγω",m:"Vb Aor Fuerte",s:"N",t:"huyeron"}],
                12: [{w:"αὐτὸς",l:"αὐτός",m:"Pron Nom",s:"Suj",t:"él mismo"}],
                13: [{w:"ἔγνω",l:"γιγνώσκω",m:"Vb Aor Atemático",s:"N",t:"reconoció"}],
                14: [{w:"τόξον",l:"τόξον",m:"Sust Acus",s:"CD",t:"arco"}],
                15: [{w:"ἐποίησα",l:"ποιέω",m:"Vb Aor Sigmático",s:"N",t:"construí"}]
            };
            const data = ANALYSIS_DATA[levelId] || [];
            return (
                <div className="mt-8 border-t-2 border-slate-700/50 pt-6">
                    <button onClick={() => setIsOpen(!isOpen)} className="flex items-center justify-center gap-2 w-full bg-slate-900/80 text-amber-500 font-serif italic py-3 rounded-xl border border-amber-900/30 shadow-sm"><Database size={18} /> {isOpen ? 'Ocultar Papiro' : 'Revelar Análisis Morfosintáctico'}</button>
                    {isOpen && (
                        <div className="mt-4 overflow-x-auto bg-[#fffbf0] p-4 rounded-xl border-2 border-[#b45309]">
                            <table className="table-analysis">
                                <thead><tr><th>Palabra</th><th>Lema</th><th>Morfología</th><th>Sintaxis</th><th>Traducción</th></tr></thead>
                                <tbody>
                                    {data.map((item, index) => (<tr key={index}><td className="font-bold text-[#9a3412]">{item.w}</td><td>{item.l}</td><td>{item.m}</td><td>{item.s}</td><td className="italic text-[#854d0e]">{item.t}</td></tr>))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        };

        const LEVELS = [
          { id: 1, location: "Troya", athenaMsg: "El viaje del Nóstos comienza. Los aqueos llenan sus barcos.", title: "1. El Origen", lore: "Abandonáis las costas de Ilión.", codexUnlock: "mitologia", papyrusText: <div className="text-center">μετὰ τὸν <InteractiveWord word="πόλεμον" hint="CD. Acusativo" type="grammar"/> ὁ Ὀδυσσεὺς τὴν Τροίαν ἔλιπεν.</div>, translation: "Después de la guerra Odiseo dejó Troya.", instruction: "Abre Mitología.", question: "¿Quién es tu enemigo principal?", options: [{ text: "Apolo", correct: false }, { text: "Poseidón", correct: true }], oracleHint: "El dios del mar.", reward: "Favor de Atenea", rewardIcon: "🦉", mapX: 85, mapY: 15 },
          { id: 2, location: "Lotófagos", athenaMsg: "Cuidado con el loto. El pasado habita aquí.", title: "2. El Olvido", lore: "Comen la flor y olvidan su patria.", codexUnlock: "verbos_presente", papyrusText: <div className="text-center">οἱ ἑταῖροι τὸν λωτὸν ἤσθιον.</div>, translation: "Los compañeros comían el loto.", instruction: "Revisa Imperfecto.", question: "¿Por qué ἤσθιον lleva η?", options: [{ text: "Contracción", correct: false }, { text: "Aumento Temporal", correct: true }], oracleHint: "Marca de pasado vocal.", reward: "Loto", rewardIcon: "🌸", mapX: 75, mapY: 85 },
          { id: 3, location: "Polifemo", athenaMsg: "Ciega al gigante para escapar.", title: "3. El Cíclope", lore: "Atrapados en la cueva.", codexUnlock: "declinaciones", papyrusText: <div className="text-center">Ὀδυσσεὺς τὸν <InteractiveWord word="ὀφθαλμὸν" hint="Acusativo Sg." type="vocab"/> βάλλει.</div>, translation: "Odiseo atraviesa el ojo.", instruction: "Usa el Acusativo.", question: "¿Qué caso es τὸν ὀφθαλμὸν?", options: [{ text: "Nominativo", correct: false }, { text: "Acusativo", correct: true }], oracleHint: "Termina en -ον.", reward: "Estaca", rewardIcon: "🔥", mapX: 65, mapY: 70 },
          { id: 4, location: "Isla de Eolo", athenaMsg: "Eolo te da los vientos en un saco.", title: "4. Los Vientos", lore: "Los vientos vienen del mar.", codexUnlock: "funciones", papyrusText: <div className="text-center">ἄνεμοι ἐκ τῆς θαλάττης ἔρχονται.</div>, translation: "Vientos vienen del mar.", instruction: "Preposiciones de origen.", question: "¿Qué caso exige la preposición ἐκ?", options: [{ text: "Acusativo", correct: false }, { text: "Genitivo", correct: true }], oracleHint: "Indica origen o separación.", reward: "Saco", rewardIcon: "💨", mapX: 60, mapY: 55 },
          { id: 5, location: "Lestrigones", athenaMsg: "Gigantes lanzan rocas.", title: "5. Rocas", lore: "Caníbales atacan.", codexUnlock: "vocabulario", papyrusText: <div className="text-center">Λαιστρυγόνες μεγάλους λίθους βάλλουσιν.</div>, translation: "Lanzan grandes piedras.", instruction: "Repasa adjetivos.", question: "¿En qué concuerda un adjetivo?", options: [{ text: "Raíz", correct: false }, { text: "Género, Número, Caso", correct: true }], oracleHint: "Tres rasgos exactos.", reward: "Espada", rewardIcon: "🗡️", mapX: 55, mapY: 30 },
          { id: 6, location: "Eea (Circe)", athenaMsg: "Pociones y vocales fusionadas.", title: "6. La Hechicera", lore: "Circe prepara venenos.", codexUnlock: "diccionario", papyrusText: <div className="text-center">ἡ κακὴ Κίρκη φάρμακα ποιεῖ.</div>, translation: "La mala Circe prepara venenos.", instruction: "Verbos Contractos.", question: "¿Qué resulta de τιμά-ομεν?", options: [{ text: "τιμοῦμεν", correct: false }, { text: "τιμῶμεν", correct: true }], oracleHint: "La 'a' y la 'o' dan omega.", reward: "Moly", rewardIcon: "🌿", mapX: 45, mapY: 35 },
          { id: 7, location: "Hades", athenaMsg: "Desciende a las sombras.", title: "7. Las Sombras", lore: "Odiseo fue al Hades.", codexUnlock: "aoristos", papyrusText: <div className="text-center">Ὀδυσσεὺς εἰς τὸν Ἅιδην ἦλθεν.</div>, translation: "Odiseo fue al Hades.", instruction: "Aoristos Fuertes.", question: "¿Aoristo fuerte de λείπω?", options: [{ text: "ἔλιπε", correct: true }, { text: "ἔλειψε", correct: false }], oracleHint: "Pierde la vocal épsilon.", reward: "Profecía", rewardIcon: "👁️", mapX: 20, mapY: 25 },
          { id: 8, location: "Sirenas", athenaMsg: "Atado al mástil.", title: "8. El Canto", lore: "Voces que matan.", codexUnlock: "voz_media", papyrusText: <div className="text-center">Ὀδυσσεὺς βούλεται ἀκούειν τὸν μῦθον.</div>, translation: "Odiseo quiere escuchar el relato.", instruction: "Verbos deponentes.", question: "¿Qué es βούλεται?", options: [{ text: "Pasivo", correct: false }, { text: "Deponente", correct: true }], oracleHint: "Forma media, sentido activo.", reward: "Cuerda", rewardIcon: "🪢", mapX: 30, mapY: 50 },
          { id: 9, location: "Escila", athenaMsg: "Seis cabezas hambrientas.", title: "9. El Sacrificio", lore: "Escila arrebata hombres.", codexUnlock: "analizador", papyrusText: <div className="text-center">Σκύλλα ἁρπάζει ἑταίρους.</div>, translation: "Escila arrebata compañeros.", instruction: "Participios activos.", question: "¿Participio de ἔχω (Masc)?", options: [{ text: "ἔχων", correct: true }, { text: "ἐχόμενος", correct: false }], oracleHint: "Usa el sufijo -ων.", reward: "Lágrima", rewardIcon: "💧", mapX: 40, mapY: 65 },
          { id: 10, location: "Calipso", athenaMsg: "Siete años atrapado.", title: "10. Inmortalidad", lore: "Odiseo se lamenta.", codexUnlock: "literatura", papyrusText: <div className="text-center">Ὀδυσσεὺς ἐπὶ τῇ ἀκτῇ κάθηται.</div>, translation: "Odiseo está sentado en la orilla.", instruction: "Voz media reflexiva.", question: "¿Qué indica la voz media?", options: [{ text: "Acción forzada", correct: false }, { text: "Reflexividad corporal", correct: true }], oracleHint: "Acción sobre el propio sujeto.", reward: "Madera", rewardIcon: "🪵", mapX: 50, mapY: 80 },
          { id: 11, location: "Esqueria", athenaMsg: "Encuentro con Nausícaa.", title: "11. Nausícaa", lore: "Las esclavas huyeron.", codexUnlock: "aoristos", papyrusText: <div className="text-center">αἱ δοῦλαι ἔφυγον.</div>, translation: "Las esclavas huyeron.", instruction: "Raíz de φεύγω.", question: "¿Qué ocurre en la raíz (φευγ-)?", options: [{ text: "Añade sigma", correct: false }, { text: "Grado cero (φυγ-)", correct: true }], oracleHint: "La raíz se reduce.", reward: "Manto", rewardIcon: "🥻", mapX: 60, mapY: 70 },
          { id: 12, location: "Ítaca", athenaMsg: "Has vuelto disfrazado.", title: "12. Perro Argos", lore: "Tu perro te reconoce.", codexUnlock: "declinaciones", papyrusText: <div className="text-center">αὐτὸς ἐγγὺς ἐλθεῖν οὐκέτι ἐδύνατο.</div>, translation: "Él mismo ya no podía acercarse.", instruction: "Pronombre autos.", question: "¿Cómo se traduce αὐτὸς solo?", options: [{ text: "Él mismo", correct: true }, { text: "Lo", correct: false }], oracleHint: "Énfasis de identidad.", reward: "Lealtad", rewardIcon: "🐶", mapX: 75, mapY: 60 },
          { id: 13, location: "Palacio", athenaMsg: "Una cicatriz revela todo.", title: "13. Euriclea", lore: "La anciana reconoce la marca.", codexUnlock: "verbos_presente", papyrusText: <div className="text-center">αὐτίκα δὲ τὴν οὐλὴν ἔγνω.</div>, translation: "Reconoció la cicatriz.", instruction: "Aoristo Atemático.", question: "¿Qué es ἔγνω?", options: [{ text: "Regular", correct: false }, { text: "Atemático", correct: true }], oracleHint: "Sin vocales de unión.", reward: "Silencio", rewardIcon: "🤫", mapX: 85, mapY: 40 },
          { id: 14, location: "Mégaron", athenaMsg: "Tensa el arco.", title: "14. El Arco", lore: "La matanza comienza.", codexUnlock: "voz_media", papyrusText: <div className="text-center">Ὀδυσσεὺς λαμβάνει τὸ τόξον.</div>, translation: "Odiseo toma el arco.", instruction: "Voz media de interés.", question: "¿Forma media de λύω (1ª Sg)?", options: [{ text: "λύομαι", correct: true }, { text: "ἔλυσα", correct: false }], oracleHint: "Sufijo -ομαι.", reward: "Flecha", rewardIcon: "🏹", mapX: 95, mapY: 30 },
          { id: 15, location: "Lecho", athenaMsg: "El secreto del olivo.", title: "15. Juicio Final", lore: "Yo construí el lecho.", codexUnlock: "adjetivos", papyrusText: <div className="text-center">ἐγὼ τὸ λέχος ἐποίησα.</div>, translation: "Yo construí el lecho.", instruction: "Aoristo contracto.", question: "¿Qué pasa con la 'ε'?", options: [{ text: "Desaparece", correct: false }, { text: "Se alarga a 'η'", correct: true }], oracleHint: "Alargamiento vocálico.", reward: "Corona", rewardIcon: "👑", mapX: 95, mapY: 45 }
        ];
        const AthenaGuide = ({ message }) => {
          const [displayedText, setDisplayedText] = useState('');
          useEffect(() => {
            setDisplayedText(''); let i = 0;
            const intervalId = setInterval(() => { setDisplayedText(message.substring(0, i + 1)); i++; if (i >= message.length) clearInterval(intervalId); }, 18);
            return () => clearInterval(intervalId);
          }, [message]);
          return (
            <div className="bg-slate-900/90 border-2 border-amber-500/40 p-5 rounded-2xl flex gap-4 items-start mb-8 shadow-2xl">
              <div className="shrink-0 p-4 rounded-full bg-slate-950 border border-amber-400/60 shadow-[0_0_15px_rgba(217,119,6,0.6)]"><Feather className="text-amber-400" size={32} /></div>
              <div>
                <h4 className="text-amber-500 font-bold uppercase text-xs mb-2">Atenea Glaucópide te aconseja:</h4>
                <p className="text-slate-200 text-lg italic font-serif">"{displayedText}"</p>
              </div>
            </div>
          );
        };

        const OdysseyMap = ({ currentLevelId }) => (
          <div className="relative w-full aspect-[3/1] bg-slate-950 rounded-2xl border border-slate-700 overflow-hidden mb-8 shadow-2xl bg-stars">
             <svg className="absolute inset-0 w-full h-full z-10" preserveAspectRatio="none">
                <path d="M 85 15 C 80 40, 90 70, 75 85 C 65 95, 55 80, 65 70 C 70 60, 50 45, 60 55 C 65 60, 45 30, 55 30 C 65 30, 30 20, 45 35 C 50 40, 20 15, 20 25 C 20 35, 30 40, 30 50 C 30 60, 50 70, 40 65 C 30 60, 60 90, 50 80 C 40 70, 70 70, 60 70 C 50 70, 80 50, 75 60 C 70 70, 90 30, 85 40 C 80 50, 100 20, 95 30 C 90 40, 100 50, 95 45" fill="none" stroke="#1e293b" strokeWidth="4" strokeDasharray="6,6" />
                <path d="M 85 15 C 80 40, 90 70, 75 85 C 65 95, 55 80, 65 70 C 70 60, 50 45, 60 55 C 65 60, 45 30, 55 30 C 65 30, 30 20, 45 35 C 50 40, 20 15, 20 25 C 20 35, 30 40, 30 50 C 30 60, 50 70, 40 65 C 30 60, 60 90, 50 80 C 40 70, 70 70, 60 70 C 50 70, 80 50, 75 60 C 70 70, 90 30, 85 40 C 80 50, 100 20, 95 30 C 90 40, 100 50, 95 45" fill="none" stroke="#fbbf24" strokeWidth="3" strokeDasharray="3000" strokeDashoffset={3000 - (currentLevelId * (3000/15))} className="transition-all duration-[2000ms]" />
             </svg>
             {LEVELS.map(l => (
                 <div key={l.id} className="absolute -translate-x-1/2 -translate-y-1/2 z-20" style={{ left: `${l.mapX}%`, top: `${l.mapY}%` }}>
                    <div className={`w-4 h-4 rounded-full border-2 ${l.id === currentLevelId ? 'bg-amber-500 scale-150 shadow-[0_0_15px_#fbbf24]' : l.id < currentLevelId ? 'bg-amber-900 border-amber-600' : 'bg-slate-900 border-slate-700'}`}></div>
                 </div>
             ))}
          </div>
        );

        function App() {
          const [gameState, setGameState] = useState('intro');
          const [levelIndex, setLevelIndex] = useState(0);
          const [inventory, setInventory] = useState([]);
          const [isCodexOpen, setIsCodexOpen] = useState(false);
          const [activeTopic, setActiveTopic] = useState('literatura');
          const [unlockedCodex, setUnlockedCodex] = useState(['literatura', 'mitologia', 'diccionario', 'vocabulario', 'analizador', 'funciones', 'declinaciones', 'verbos_presente', 'aoristos', 'voz_media', 'adjetivos']);
          const [feedback, setFeedback] = useState(null);
          const [showOracle, setShowOracle] = useState(false);

          const currentLevel = LEVELS[levelIndex];

          const CODEX_DATA = {
            literatura: { category: "Contexto", title: "Literatura y Oralidad", icon: <Feather size={20} />, content: <div className="text-slate-300 space-y-4"><p>Tradición oral, aedos y el Nóstos (regreso). Ética heroica: Aidos (honor) y Hybris (soberbia).</p></div> },
            declinaciones: { category: "Morfología", title: "Casos y Declinaciones", icon: <Layers size={20} />, content: <div className="text-slate-300 space-y-4">
              <table className="table-greek w-full text-center">
                <thead><tr><th>Caso</th><th>1ª Pers (ἐγώ)</th><th>2ª Pers (σύ)</th></tr></thead>
                <tbody>
                  <tr><td>Nom</td><td>ἐγώ</td><td>σύ</td></tr>
                  <tr><td>Gen</td><td>ἐμοῦ / μου</td><td>σοῦ / σου</td></tr>
                  <tr><td>Dat</td><td>ἐμοί / μοι</td><td>σοί / σοι</td></tr>
                </tbody>
              </table>
              <p>Nominativo (Sujeto), Acusativo (CD), Genitivo (CN), Dativo (CI/Instr).</p>
            </div> },
            verbos_presente: { category: "Verbos", title: "Acción Continua", icon: <Sparkles size={20} />, content: <div className="text-slate-300"><p>Presente e Imperfecto. Aumento silábico (ἐ-) y temporal (alargamiento de vocal).</p></div> },
            aoristos: { category: "Verbos", title: "Acción Puntual", icon: <Key size={20} />, content: <div className="text-slate-300"><p>Sigmáticos (-σα), Fuertes (cambio de raíz) y Atemáticos (directos).</p></div> },
            analizador: { category: "Mágico", title: "Analizador Universal", icon: <Search size={20} />, content: <AnalizadorUniversal /> },
            diccionario: { category: "Mágico", title: "Diccionario Épico", icon: <BookOpen size={20} />, content: <DiccionarioEpico /> },
            funciones: { category: "Mágico", title: "Forja de Homero", icon: <Zap size={20} />, content: <div className="space-y-6"><IsopsephiaCalculator /><HomericScansion /><EpithetGenerator /></div> },
            mitologia: { category: "Mito", title: "Mitología y Monstruos", icon: <Shield size={20} />, content: <div className="text-slate-300"><p>Poseidón (ira marina), Polifemo (barbarie), Circe (instinto), Sirenas (seducción intelectual).</p></div> },
            adjetivos: { category: "Morfología", title: "Adjetivos", icon: <Layers size={20} />, content: <div className="text-slate-300"><p>1ª Clase (2-1-2) y 2ª Clase (3ª Declinación). Concordancia en Género, Número y Caso.</p></div> }
          };

          return (
            <div className="min-h-screen bg-[#020617] text-slate-200">
              <header className="p-4 border-b border-slate-800 bg-slate-950 flex justify-between shadow-lg">
                <h1 className="text-2xl font-black text-amber-500 uppercase tracking-widest">La Odisea</h1>
                {gameState === 'playing' && <button onClick={() => setIsCodexOpen(true)} className="bg-slate-800 text-amber-400 px-6 py-2 rounded-xl border border-amber-600/50">Códex</button>}
              </header>

              <main className="max-w-5xl mx-auto p-6 pb-40">
                {gameState === 'intro' && (
                  <div className="text-center py-20 animate-in zoom-in">
                    <h2 className="text-[6rem] font-black text-amber-500 mb-8 leading-none">LA ODISEA</h2>
                    <VideoIntro />
                    <button onClick={() => setGameState('playing')} className="bg-amber-600 px-16 py-6 text-black text-2xl font-black rounded-2xl hover:scale-105 shadow-2xl">Zarpar de Troya</button>
                  </div>
                )}
                {gameState === 'playing' && (
                  <div className="space-y-8 animate-in slide-in-from-bottom-10">
                    <OdysseyMap currentLevelId={currentLevel.id} />
                    <AthenaGuide message={currentLevel.athenaMsg} />
                    <div className="bg-slate-900/80 p-8 rounded-3xl border border-slate-700">
                      <h2 className="text-4xl font-black text-white mb-2">{currentLevel.title}</h2>
                      <p className="text-xl text-amber-500 italic">{currentLevel.lore}</p>
                    </div>
                    <div className="papyrus-bg p-12 rounded-3xl text-center shadow-2xl border-y-8 border-amber-900">
                      <AedoPlayer />
                      <div className="greek-font text-4xl mb-12 text-[#2c1810] leading-loose">{currentLevel.papyrusText}</div>
                      <div className="bg-white/80 p-6 rounded-2xl text-xl text-amber-950 border-l-8 border-amber-800 shadow-inner">{currentLevel.translation}</div>
                      <WordAnalysisTable levelId={currentLevel.id} />
                    </div>
                    <div className="bg-slate-900 p-12 rounded-3xl border border-slate-700 shadow-2xl">
                      <p className="text-blue-400 uppercase text-xs font-black mb-4">Misión: {currentLevel.instruction}</p>
                      <h3 className="text-3xl font-black text-white mb-8">{currentLevel.question}</h3>
                      <div className="grid gap-4">
                        {currentLevel.options.map((opt, i) => (
                          <button key={i} onClick={() => {
                            if(feedback) return;
                            if(opt.correct) {
                              setFeedback({ text: '¡Respuesta Sublime!', type: 'success' });
                              if(!inventory.some(item => item.name === currentLevel.reward)) setInventory([...inventory, { name: currentLevel.reward, icon: currentLevel.rewardIcon }]);
                              setTimeout(() => { setFeedback(null); setShowOracle(false); if(levelIndex < LEVELS.length -1) setLevelIndex(l => l+1); else setGameState('victory'); window.scrollTo(0,0); }, 3000);
                            } else { setFeedback({ text: 'Error fatal', type: 'error' }); setTimeout(() => setFeedback(null), 2000); }
                          }} className={`w-full p-8 text-left text-xl rounded-2xl border-2 transition-all ${feedback ? (opt.correct ? 'bg-green-900 border-green-500' : 'opacity-50') : 'bg-slate-800 border-slate-600 hover:border-amber-500'}`}>{opt.text}</button>
                        ))}
                      </div>
                      {!feedback && <button onClick={() => setShowOracle(!showOracle)} className="mt-8 text-purple-300 underline block mx-auto font-bold">{showOracle ? 'Ocultar' : 'Consultar Oráculo'}</button>}
                      {showOracle && !feedback && <div className="mt-6 p-6 bg-purple-950/50 border border-purple-500 rounded-2xl italic text-center">"{currentLevel.oracleHint}"</div>}
                      {feedback && <div className={`mt-8 p-6 text-2xl font-black text-center rounded-2xl ${feedback.type === 'success' ? 'text-green-400' : 'text-red-400'}`}>{feedback.text}</div>}
                    </div>
                  </div>
                )}
                {gameState === 'victory' && <div className="text-center py-24 animate-in zoom-in"><Crown size={150} className="mx-auto text-amber-500 mb-8"/><h2 className="text-[5rem] font-black text-amber-500 mb-8">¡NÓSTOS COMPLETADO!</h2><button onClick={() => window.location.reload()} className="bg-amber-600 px-16 py-6 text-black text-2xl font-black rounded-2xl">Reiniciar Epopeya</button></div>}
              </main>

              {gameState === 'playing' && (
                <div className="fixed bottom-0 w-full bg-slate-950/95 border-t border-slate-800 p-4 z-40 overflow-x-auto flex items-center gap-4">
                  <span className="text-amber-500 font-black uppercase text-xs">Tesoros:</span>
                  {inventory.map((item, idx) => (<div key={idx} className="bg-slate-800 px-4 py-2 rounded-xl flex items-center gap-2 border border-slate-700 whitespace-nowrap shadow-md"><span className="text-xl">{item.icon}</span><span className="text-xs font-bold">{item.name}</span></div>))}
                </div>
              )}

              {isCodexOpen && (
                <div className="fixed inset-0 z-50 bg-slate-950/95 p-6 flex">
                  <div className="bg-[#0f172a] w-full h-full rounded-3xl flex overflow-hidden border-2 border-amber-500 relative shadow-2xl">
                    <button onClick={() => setIsCodexOpen(false)} className="absolute top-6 right-6 z-50 text-white bg-red-600 p-3 rounded-full"><XCircle size={28}/></button>
                    <div className="w-80 border-r border-slate-800 p-6 overflow-y-auto flex flex-col gap-3 bg-[#020617] custom-scrollbar">
                      {Object.keys(CODEX_DATA).map(k => (
                        <button key={k} onClick={() => setActiveTopic(k)} className={`p-4 text-left rounded-xl transition-all border-2 ${activeTopic === k ? 'bg-slate-800 border-amber-500 text-amber-400' : 'bg-slate-900 border-slate-800 text-slate-300'}`}>
                           <span className="text-[10px] uppercase text-slate-500 block mb-1">{CODEX_DATA[k].category}</span>
                           <strong className="block">{CODEX_DATA[k].title}</strong>
                        </button>
                      ))}
                    </div>
                    <div className="flex-1 p-12 overflow-y-auto custom-scrollbar">
                         <h3 className="text-5xl font-black mb-10 text-white border-b-2 border-slate-800 pb-8">{CODEX_DATA[activeTopic].title}</h3>
                         {CODEX_DATA[activeTopic].content}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
