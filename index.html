    <style>
      @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }

      @keyframes float-note { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-30px) scale(1.5); opacity: 0; } }

      .animate-note-delayed { animation: float-note 2s ease-out 1s infinite; }
      .papyrus-bg { background-color: #eaddc5; background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E"); color: #2c1810; }
      .table-greek { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
      .table-greek th { background-color: #1e293b; color: #fbbf24; padding: 8px; border: 1px solid #334155; font-weight: bold; text-align: center; }
      .table-greek td { padding: 8px; border: 1px solid #334155; color: #cbd5e1; background-color: #0f172a; text-align: center; }
      .table-greek .highlight { color: #38bdf8; font-weight: bold; }
      .table-greek .highlight-alt { color: #f87171; font-weight: bold; }
      .table-analysis { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.8rem; }
      .table-analysis th { background-color: #451a03; color: #fde68a; padding: 8px; border: 1px solid #78350f; font-weight: bold; text-align: center; }
      .table-analysis td { padding: 8px; border: 1px solid #78350f; color: #431407; background-color: #fef3c7; text-align: center; font-family: 'Palatino Linotype', serif; }
      .table-analysis tr:nth-child(even) td { background-color: #fde68a; }
      .greek-font { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; line-height: 2.2; }
      .perspective-1000 { perspective: 1000px; }
      .transform-style-3d { transform-style: preserve-3d; }
      .backface-hidden { backface-visibility: hidden; }
      .rotate-y-180 { transform: rotateY(180deg); }

</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-amber-500/30 overflow-x-hidden relative">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { BookOpen, Key, Shield, Scroll, CheckCircle2, XCircle, ArrowRight, Anchor, Compass, Sparkles, AlertTriangle, Info, MessageCircle, Star, Crown, Eye, Feather, Volume2, Music, Layers, RefreshCcw, Navigation, Search, Map, Zap, Database, Activity, Calculator, Flame } from 'lucide-react';

        const InteractiveWord = ({ word, hint, type = "grammar" }) => (
          <span className="group relative inline-block cursor-help hover:text-amber-700 transition-colors border-b-2 border-dotted border-amber-900/50 hover:border-amber-700 px-1 font-bold">
            {word}
            <span className={`absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-max max-w-[280px] p-3 text-[13px] font-sans rounded opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none shadow-2xl leading-relaxed ${type === 'grammar' ? 'bg-slate-900 text-slate-100 border-l-4 border-blue-500' : type === 'vocab' ? 'bg-slate-900 text-slate-100 border-l-4 border-emerald-500' : 'bg-slate-900 text-slate-100 border-l-4 border-amber-500'}`}>{hint}</span>
          </span>
        );

        const VideoIntro = () => (
          <div className="w-full max-w-4xl mx-auto rounded-3xl overflow-hidden shadow-[0_0_60px_rgba(217,119,6,0.3)] border-4 border-amber-600/50 mb-12 relative bg-slate-950 aspect-video group">
            <iframe className="absolute inset-0 w-full h-full" src="https://www.youtube.com/embed/ndj37zSR5Uo?autoplay=0&rel=0" title="La Odisea" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowFullScreen></iframe>
          </div>
        );

        const Flashcard = ({ greek, spanish, type }) => {
          const [flipped, setFlipped] = useState(false);
          return (
            <div className="relative w-full h-32 cursor-pointer perspective-1000 group" onClick={() => setFlipped(!flipped)}>
              <div className={`w-full h-full transition-transform duration-500 transform-style-3d shadow-xl ${flipped ? 'rotate-y-180' : 'group-hover:-translate-y-2'}`}>
                <div className="absolute w-full h-full backface-hidden flex flex-col items-center justify-center bg-slate-800 border-2 border-slate-600 rounded-xl p-2 text-center">
                  <span className="text-2xl font-serif text-amber-400 font-bold leading-tight">{greek}</span>
                  <span className="text-[10px] text-slate-400 mt-2 uppercase tracking-widest bg-slate-900 px-2 py-1 rounded-full"><RefreshCcw size={10} className="inline mr-1"/> Girar</span>
                </div>
                <div className="absolute w-full h-full backface-hidden rotate-y-180 flex flex-col items-center justify-center bg-amber-900 border-2 border-amber-500/50 rounded-xl p-2 text-center">
                  <span className="text-sm md:text-base font-black text-slate-100 uppercase tracking-wide leading-tight">{spanish}</span>
                  <span className="text-[10px] text-amber-200 mt-2 font-mono bg-black/30 px-3 py-1 rounded-full">{type}</span>
                </div>
              </div>
            </div>
          );
        };

        const playLyreNote = (audioCtx, freq, time) => {
          const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
          osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, time);
          gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.3, time + 0.05); gain.gain.exponentialRampToValueAtTime(0.001, time + 1.2);
          osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 1.2);
        };

        const AedoPlayer = () => {
          const [isPlaying, setIsPlaying] = useState(false); const audioCtxRef = useRef(null);
          const togglePlay = () => {
            if (isPlaying) return;
            if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
            const ctx = audioCtxRef.current; if (ctx.state === 'suspended') ctx.resume();
            setIsPlaying(true);
            const melody = [329.63, 392.00, 349.23, 329.63, 293.66, 329.63, 440.00, 392.00, 349.23, 329.63, 293.66, 261.63, 293.66, 329.63, 329.63];
            let startTime = ctx.currentTime + 0.1;
            melody.forEach((freq, i) => { const delay = i > 8 ? 0.6 : 0.4; playLyreNote(ctx, freq, startTime); startTime += delay; });
            setTimeout(() => setIsPlaying(false), startTime * 1000 - ctx.currentTime * 1000 + 1000);
          };
          return (
            <div className="flex justify-center my-4 relative z-10">
              <button onClick={togglePlay} disabled={isPlaying} className={`flex items-center gap-2 px-6 py-2.5 rounded-full border transition-all font-serif italic text-sm md:text-base shadow-lg ${isPlaying ? 'bg-amber-200 text-amber-950 border-amber-500 scale-105' : 'bg-slate-900 text-amber-400 border-amber-600/50 hover:bg-slate-800'}`}>
                {isPlaying ? <Music className="animate-pulse text-amber-600" size={18} /> : <Volume2 size={18} />} {isPlaying ? 'El Aedo toca...' : 'Escuchar Aedo'}
              </button>
              {isPlaying && (<><div className="absolute -top-4 left-1/4 animate-note text-amber-500">🎵</div><div className="absolute top-2 right-1/4 animate-note-delayed text-amber-600">🎶</div><div className="absolute -top-2 right-1/3 animate-note text-amber-400">♪</div></>)}
            </div>
          );
        };

        const IsopsephiaCalculator = () => {
            const [word, setWord] = useState('');
            const calculateValue = (str) => {
                const values = {'α':1,'β':2,'γ':3,'δ':4,'ε':5,'ζ':7,'η':8,'θ':9,'ι':10,'κ':20,'λ':30,'μ':40,'ν':50,'ξ':60,'ο':70,'π':80,'ρ':100,'σ':200,'ς':200,'τ':300,'υ':400,'φ':500,'χ':600,'ψ':700,'ω':800,'ά':1,'έ':5,'ή':8,'ί':10,'ό':70,'ύ':400,'ώ':800,'ᾶ':1,'ῆ':8,'ῖ':10,'ῦ':400,'ῶ':800,'ἀ':1,'ἐ':5,'ἠ':8,'ἰ':10,'ὀ':70,'ὐ':400,'ὠ':800,'ἁ':1,'ἑ':5,'ἡ':8,'ἱ':10,'ὁ':70,'ὑ':400,'ὡ':800};
                let total = 0; let breakdown = [];
                for (let char of str.toLowerCase()) { if (values[char]) { total += values[char]; breakdown.push(`${char}=${values[char]}`); } }
                return { total, breakdown };
            };
            const result = calculateValue(word);
            return (
                <div className="bg-slate-900 p-6 rounded-2xl border border-emerald-900/50 shadow-lg mt-6">
                    <h5 className="font-bold text-emerald-400 mb-4 flex items-center gap-2 border-b border-slate-800 pb-2"><Calculator size={20}/> El Ábaco de Pitágoras (Isopsefía)</h5>
                    <p className="text-sm text-slate-300 mb-4 leading-relaxed">Los antiguos griegos usaban su alfabeto para contar (α=1, ι=10, ρ=100...). Suma el valor místico de las letras.</p>
                    <div className="flex flex-col gap-4">
                        <input type="text" placeholder="Escribe en griego..." className="bg-slate-950 border border-slate-700 rounded-lg p-4 text-emerald-200 focus:outline-none focus:border-emerald-500 font-serif text-xl" value={word} onChange={(e) => setWord(e.target.value)} />
                        <div className="bg-slate-950/50 border border-slate-800 rounded-lg p-6 min-h-[120px] flex flex-col items-center justify-center shadow-inner">
                            {word ? (<><span className="font-mono text-5xl md:text-7xl text-emerald-400 font-bold tracking-widest text-center mb-4">{result.total}</span><span className="text-slate-500 font-mono text-sm break-words text-center">{result.breakdown.join(' + ')}</span></>) : (<span className="text-slate-600 italic">Esperando revelación...</span>)}
                        </div>
                    </div>
                </div>
            );
        };

        const HomericScansion = () => {
            const [selectedVerse, setSelectedVerse] = useState(null);
            const verses = [
                { greek: "ἄνδρα μοι ἔννεπε, μοῦσα, πολύτροπον, ὃς μάλα πολλὰ", translation: "Háblame, Musa, de aquel varón de multiforme ingenio, que mucho...", scansion: "—  ∪  ∪  |  —  ∪  ∪  |  —  ∪  ∪  |  —  ∪  ∪  |  —  ∪  ∪  |  —  —", feet: ["Dáctilo", "Dáctilo", "Dáctilo", "Dáctilo", "Dáctilo", "Espondeo"] },
                { greek: "μῆνιν ἄειδε θεὰ Πηληϊάδεω Ἀχιλῆος", translation: "Canta, oh diosa, la cólera del Pélida Aquiles...", scansion: "—  ∪  ∪  |  —  ∪  ∪  |  —  —  |  —  ∪  ∪  |  —  ∪  ∪  |  —  —", feet: ["Dáctilo", "Dáctilo", "Espondeo", "Dáctilo", "Dáctilo", "Espondeo"] },
                { greek: "ὡς ἔφατ᾽, ἔδεισεν δ᾽ ὁ γέρων καὶ ἐπείθετο μύθῳ", translation: "Así habló; el anciano sintió miedo y obedeció la orden...", scansion: "—  ∪  ∪  |  —  —  |  —  ∪  ∪  |  —  ∪  ∪  |  —  ∪  ∪  |  —  —", feet: ["Dáctilo", "Espondeo", "Dáctilo", "Dáctilo", "Dáctilo", "Espondeo"] }
            ];
            return (
                <div className="bg-slate-900 p-6 rounded-2xl border border-purple-900/50 shadow-lg mt-6 text-center">
                    <h5 className="font-bold text-purple-400 mb-4 flex items-center justify-center gap-2"><Activity size={20}/> El Compás de las Musas (Métrica)</h5>
                    <div className="flex flex-wrap gap-3 justify-center mb-6">
                        {verses.map((v, i) => (<button key={i} onClick={() => setSelectedVerse(v)} className={`px-4 py-2 rounded-lg text-sm border font-serif ${selectedVerse === v ? 'bg-purple-600 text-white' : 'bg-slate-800 text-purple-300 hover:bg-slate-700'}`}>Verso {i + 1}</button>))}
                    </div>
                    <div className="bg-slate-950 border-2 border-slate-800 rounded-xl flex flex-col items-center justify-center p-6 min-h-[160px] overflow-x-auto custom-scrollbar">
                        {selectedVerse ? (<div className="w-max mx-auto"><span className="font-serif text-xl text-amber-300 font-bold block mb-2">{selectedVerse.greek}</span><span className="font-mono text-xl md:text-2xl text-purple-400 font-black block mb-4 whitespace-pre text-center" style={{ wordSpacing: '0.2rem' }}>{selectedVerse.scansion}</span><div className="flex justify-center gap-2">{selectedVerse.feet.map((foot, idx) => (<span key={idx} className="bg-purple-900/50 text-purple-200 text-[10px] uppercase px-2 py-1 rounded">Pie {idx+1}: {foot}</span>))}</div></div>) : (<span className="text-slate-600 italic">Selecciona un verso</span>)}
                    </div>
                </div>
            );
        };

        const EpithetGenerator = () => {
            const [epithet, setEpithet] = useState(null);
            const generate = () => {
                const names = ['Ὀδυσσεὺς', 'Ἀχιλλεύς', 'Ἀγαμέμνων', 'Διομήδης', 'Ἕκτωρ'];
                const prefixes = ['πολύμητις', 'ποδάρκης', 'ἄναξ ἀνδρῶν', 'βοὴν ἀγαθὸς', 'κορυθαίολος'];
                const transNames = ['Odiseo', 'Aquiles', 'Agamenón', 'Diomedes', 'Héctor'];
                const transPrefixes = ['el fecundo en ardides', 'el de los pies ligeros', 'el rey de hombres', 'el valiente en el grito', 'el de tremolante casco'];
                const idxN = Math.floor(Math.random() * names.length); const idxP = Math.floor(Math.random() * prefixes.length);
                setEpithet({ greek: `${prefixes[idxP]} ${names[idxN]}`, trans: `${transNames[idxN]} ${transPrefixes[idxP]}` });
            };
            return (
                <div className="bg-slate-900 p-6 rounded-2xl border border-blue-900/50 shadow-lg mt-6 text-center">
                    <h5 className="font-bold text-blue-400 mb-4 flex items-center justify-center gap-2"><Zap size={20}/> Forja de Epítetos</h5>
                    <button onClick={generate} className="bg-blue-900/60 hover:bg-blue-800 text-blue-100 px-8 py-3 rounded-xl font-bold mb-6 text-sm">Generar Epíteto</button>
                    <div className="bg-slate-950 border-2 border-slate-800 rounded-xl flex flex-col items-center justify-center p-6 min-h-[120px]">
                        {epithet ? (<div><span className="font-serif text-2xl text-amber-400 font-bold block mb-2">{epithet.greek}</span><span className="text-slate-400 italic block">{epithet.trans}</span></div>) : (<span className="text-slate-600 italic">Pulsa el botón</span>)}
                    </div>
                </div>
            );
        };

        const AnalizadorUniversal = () => {
          const [word, setWord] = useState('');
          const lexicon = {
            'λύομαι': { tipo: 'verbo', c1: 'Presente', c2: 'Media', c3: '1ª Sg', c4: 'λυ', c5: '∅', c6: 'ομαι' },
            'ἔλυσαν': { tipo: 'verbo', c1: 'Aoristo Sigm.', c2: 'Activa', c3: '3ª Pl', c4: 'λυ', c5: 'ἐ', c6: 'σαν' },
            'ἐλίπομεν': { tipo: 'verbo', c1: 'Aoristo Fuerte', c2: 'Activa', c3: '1ª Pl', c4: 'λιπ', c5: 'ἐ', c6: 'ομεν' },
            'ἐποιήσαμεν': { tipo: 'verbo', c1: 'Aor. Contracto', c2: 'Activa', c3: '1ª Pl', c4: 'ποιη', c5: 'ἐ', c6: 'σαμεν' },
            'λῦσον': { tipo: 'verbo', c1: 'Aoristo Imp.', c2: 'Activa', c3: '2ª Sg', c4: 'λυ', c5: '∅', c6: 'σον' },
            'ἔλυον': { tipo: 'verbo', c1: 'Imperfecto', c2: 'Activa', c3: '1ªSg/3ªPl', c4: 'λυ', c5: 'ἐ', c6: 'ον' },
            'τιμῶμεν': { tipo: 'verbo', c1: 'Pres. Contracto', c2: 'Activa', c3: '1ª Pl', c4: 'τιμα', c5: '∅', c6: 'ῶμεν' },
            'εἶδον': { tipo: 'verbo', c1: 'Aor. Fuerte', c2: 'Activa', c3: '1ªSg/3ªPl', c4: 'ἰδ', c5: 'εἰ', c6: 'ον' },
            'βούλεται': { tipo: 'verbo', c1: 'Presente Dep.', c2: 'Media', c3: '3ª Sg', c4: 'βουλ', c5: '∅', c6: 'εται' },
            'ἔλιπεν': { tipo: 'verbo', c1: 'Aor. Fuerte', c2: 'Activa', c3: '3ª Sg', c4: 'λιπ', c5: 'ἐ', c6: 'εν' },
            'δεόμενος': { tipo: 'verbo', c1: 'Participio', c2: 'Media', c3: 'Nom. Sg.', c4: 'δε', c5: '∅', c6: 'ομενος' },
            'πόλεμον': { tipo: 'nombre', c1: 'Acusativo', c2: 'Masc.', c3: 'Sg', c4: 'πόλεμος', c5: '2ª Decl', c6: 'ον' },
            'ἀχαιοὶ': { tipo: 'nombre', c1: 'Nominativo', c2: 'Masc.', c3: 'Pl', c4: 'Ἀχαιός', c5: '2ª Decl', c6: 'οι' },
            'πλοῖα': { tipo: 'nombre', c1: 'Acusativo', c2: 'Neut.', c3: 'Pl', c4: 'πλοῖον', c5: '2ª Decl', c6: 'α' },
            'πατρίδα': { tipo: 'nombre', c1: 'Acusativo', c2: 'Fem.', c3: 'Sg', c4: 'πατρίς', c5: '3ª Decl', c6: 'α' },
            'ὀδυσσεὺς': { tipo: 'nombre', c1: 'Nominativo', c2: 'Masc.', c3: 'Sg', c4: 'Ὀδυσσεύς', c5: '3ª Decl', c6: 'ς' },
            'τροίαν': { tipo: 'nombre', c1: 'Acusativo', c2: 'Fem.', c3: 'Sg', c4: 'Τροία', c5: '1ª Decl', c6: 'αν' },
            'θάλατταν': { tipo: 'nombre', c1: 'Acusativo', c2: 'Fem.', c3: 'Sg', c4: 'θάλαττα', c5: '1ª Decl', c6: 'αν' },
            'θεὸς': { tipo: 'nombre', c1: 'Nominativo', c2: 'Masc.', c3: 'Sg', c4: 'θεός', c5: '2ª Decl', c6: 'ος' },
            'νόστον': { tipo: 'nombre', c1: 'Acusativo', c2: 'Masc.', c3: 'Sg', c4: 'νόστος', c5: '2ª Decl', c6: 'ον' },
            'λωτοφάγοι': { tipo: 'nombre', c1: 'Nominativo', c2: 'Masc.', c3: 'Pl', c4: 'Λωτοφάγος', c5: '2ª Decl', c6: 'οι' },
            'ἄνθος': { tipo: 'nombre', c1: 'Acusativo', c2: 'Neut.', c3: 'Sg', c4: 'ἄνθος', c5: '3ª Decl', c6: 'ος' },
            'ἑταίροις': { tipo: 'nombre', c1: 'Dativo', c2: 'Masc.', c3: 'Pl', c4: 'ἑταῖρος', c5: '2ª Decl', c6: 'οις' },
            'ἑταῖροι': { tipo: 'nombre', c1: 'Nominativo', c2: 'Masc.', c3: 'Pl', c4: 'ἑταῖρος', c5: '2ª Decl', c6: 'οι' },
            'λωτὸν': { tipo: 'nombre', c1: 'Acusativo', c2: 'Masc.', c3: 'Sg', c4: 'λωτός', c5: '2ª Decl', c6: 'ον' },
            'νήσῳ': { tipo: 'nombre', c1: 'Dativo', c2: 'Fem.', c3: 'Sg', c4: 'νῆσος', c5: '2ª Decl', c6: 'ῳ' },

            'κύκλωψ': { tipo: 'nombre', c1: 'Nominativo', c2: 'Masc.', c3: 'Sg', c4: 'Κύκλωψ', c5: '3ª Decl', c6: 'ψ' },
            'ἑταίρους': { tipo: 'nombre', c1: 'Acusativo', c2: 'Masc.', c3: 'Pl', c4: 'ἑταῖρος', c5: '2ª Decl', c6: 'ους' },
            'ἄντρῳ': { tipo: 'nombre', c1: 'Dativo', c2: 'Neut.', c3: 'Sg', c4: 'ἄντρον', c5: '2ª Decl', c6: 'ῳ' },
            'ξύλον': { tipo: 'nombre', c1: 'Acusativo', c2: 'Neut.', c3: 'Sg', c4: 'ξύλον', c5: '2ª Decl', c6: 'ον' },
            'ὀφθαλμὸν': { tipo: 'nombre', c1: 'Acusativo', c2: 'Masc.', c3: 'Sg', c4: 'ὀφθαλμός', c5: '2ª Decl', c6: 'ον' },
            'αἴολος': { tipo: 'nombre', c1: 'Nominativo', c2: 'Masc.', c3: 'Sg', c4: 'Αἴολος', c5: '2ª Decl', c6: 'ος' },

                  <p className="leading-relaxed">Durante siglos, los eruditos debatieron si "Homero" (el rehén/el ciego) realmente existió. Hoy sabemos, gracias a las investigaciones de Milman Parry, que la Ilíada y la Odisea no fueron escritas por una sola pluma en un escritorio. Son la culminación de <strong>siglos de tradición oral</strong>. Los bardos (aedos) cantaban de memoria improvisando en directo gracias al <strong>hexámetro dactílico</strong>, un ritmo musical estricto.</p>

                    <div className="bg-slate-900/80 backdrop-blur-md border border-slate-700 p-6 md:p-12 rounded-3xl shadow-2xl max-w-4xl text-center leading-relaxed w-full">
                      <VideoIntro />
                      <p className="mb-4 text-xl md:text-2xl text-slate-100 font-serif italic">Háblame, Musa, de aquellos valientes de multiforme ingenio que, después de destruir la sacra ciudad de Troya, anduvieron peregrinando larguísimo tiempo... Preparad vuestro ingenio para formar parte de una aventura épica.</p>
                      <p className="mb-10 text-slate-400 text-sm md:text-base leading-loose max-w-3xl mx-auto">El regreso a Ítaca ha sido diseñado exclusivamente para vosotros. Encontraréis textos griegos extendidos y didácticos, cuadros gramaticales rigurosos, el simulador del <strong>Canto del Aedo</strong>, tarjetas de memoria, el <strong>Analizador Morfológico</strong> y muchas sorpresas más. Atenea y el Oráculo guiarán vuestros pasos.</p>
                      <button onClick={startGame} className="group relative inline-flex items-center justify-center gap-3 bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 text-lg md:text-xl font-black px-12 py-5 rounded-2xl overflow-hidden transition-all hover:scale-105 active:scale-95 w-full md:w-auto shadow-[0_0_40px_rgba(217,119,6,0.5)] border-2 border-amber-300/50">Comenzar la Epopeya <ArrowRight className="group-hover:translate-x-2 transition-transform" /></button>
                    </div>
                  </div>
                )}

                {gameState === 'playing' && (
                  <div className={`space-y-6 transition-transform duration-300 ${shake ? 'animate-shake' : ''}`}>
                    <OdysseyMap currentLevelId={currentLevel.id} />
                    <AthenaGuide message={currentLevel.athenaMsg} key={`athena-${currentLevel.id}`} />
                    <div className="flex items-center gap-4 animate-in slide-in-from-left duration-500 bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                      <div className="bg-gradient-to-br from-amber-700 to-amber-900 text-amber-300 w-14 h-14 rounded-2xl flex items-center justify-center font-black text-3xl border border-amber-500/50 shadow-[0_0_20px_rgba(217,119,6,0.4)] shrink-0">{currentLevel.id}</div>
                      <div><h2 className="text-xl md:text-3xl font-black text-slate-100 tracking-tight">{currentLevel.title}</h2><p className="text-amber-500/80 text-sm md:text-base font-serif italic">{currentLevel.lore}</p></div>
                    </div>
                    <div className="papyrus-bg p-6 md:p-12 rounded-2xl shadow-2xl border-y-[8px] border-x-2 border-double border-amber-900/70 relative animate-in zoom-in-95 duration-700 mt-6 overflow-hidden">
                      <h3 className="text-center font-serif font-black text-amber-950 border-b border-amber-900/30 pb-3 mb-6 uppercase tracking-[0.3em] text-xs md:text-sm flex items-center justify-center gap-3 opacity-80"><Feather size={16} /> Fragmento Homérico Adaptado <Feather size={16} /></h3>
                      <AedoPlayer />
                      <div className="greek-font text-[1.4rem] md:text-4xl text-center mb-10 mt-6 font-medium text-amber-950 drop-shadow-sm tracking-wider">{currentLevel.papyrusText}</div>
                      <div className="bg-white/70 p-5 rounded-xl text-sm md:text-lg text-amber-950 font-serif border-l-[6px] border-amber-800 shadow-md"><strong>Traducción:</strong> {currentLevel.translation}</div>
                      <div className="mt-4 text-center text-[10px] md:text-xs font-bold text-amber-900/60 uppercase tracking-widest bg-amber-900/10 py-1.5 px-4 rounded-full w-max mx-auto border border-amber-900/20"><Info size={14} className="inline mr-1"/> Pasa el ratón sobre las palabras punteadas</div>
                      <WordAnalysisTable levelId={currentLevel.id} />
                    </div>
                    <div className="bg-slate-900/90 border border-slate-700 rounded-3xl p-6 md:p-10 shadow-2xl animate-in slide-in-from-bottom-8 duration-700 mt-8 relative overflow-hidden backdrop-blur-sm">
                      <div className="absolute -top-10 -right-10 p-4 opacity-5 pointer-events-none transform rotate-12"><Scroll size={200} /></div>
                      <div className="bg-blue-950/40 border-l-[6px] border-blue-500 p-5 rounded-xl flex gap-4 items-start mb-8 relative z-10 shadow-inner">
                        <Shield className="text-blue-400 shrink-0 mt-0.5" size={24} />
                        <p className="text-blue-100 text-sm md:text-base leading-relaxed"><strong className="text-blue-400 block mb-1 uppercase tracking-widest text-xs">Misión Principal:</strong> {currentLevel.instruction}</p>
                      </div>
                      <h3 className="text-xl md:text-2xl font-black text-slate-100 mb-8 leading-relaxed relative z-10">{currentLevel.question}</h3>
                      <div className="grid gap-4 relative z-10">
                        {currentLevel.options.map((opt, idx) => (
                          <button key={idx} onClick={() => handleAnswer(opt)} disabled={feedback !== null} className={`w-full text-left p-5 md:p-6 rounded-2xl border-2 transition-all flex items-center justify-between group ${feedback ? (opt.correct ? 'border-green-500 bg-green-900/30 text-green-300 shadow-[0_0_30px_rgba(34,197,94,0.3)] scale-[1.02]' : 'border-slate-800 bg-slate-900/50 opacity-40 cursor-not-allowed') : 'border-slate-700 bg-slate-800/80 hover:bg-slate-700 hover:border-amber-500 hover:text-amber-400 hover:shadow-[0_0_20px_rgba(217,119,6,0.2)] hover:-translate-y-1'}`}>
                            <span className="pr-4 text-sm md:text-lg font-medium leading-snug">{opt.text}</span>
                            {!feedback && <div className="w-6 h-6 rounded-full border-2 border-slate-500 group-hover:border-amber-400 shrink-0 transition-colors bg-slate-900"></div>}
                            {feedback && opt.correct && <CheckCircle2 className="text-green-500 shrink-0 bg-green-950 rounded-full" size={32} />}
                          </button>
                        ))}
                      </div>
                      {!feedback && (
                        <div className="mt-10 flex justify-center relative z-10">
                          <button onClick={() => setShowOracle(!showOracle)} className="flex items-center gap-2 text-sm md:text-base font-bold text-purple-300 hover:text-purple-100 bg-purple-900/30 hover:bg-purple-800/50 px-8 py-4 rounded-full border-2 border-purple-700/50 transition-all shadow-[0_0_20px_rgba(168,85,247,0.3)] hover:shadow-[0_0_30px_rgba(168,85,247,0.5)] hover:scale-105">
                            <Eye size={20}/> {showOracle ? 'Ocultar la Visión del Oráculo' : 'Consultar al Oráculo de Delfos'}
                          </button>
                        </div>
                      )}
                      {showOracle && !feedback && (
                        <div className="mt-6 p-6 bg-purple-950/50 border border-purple-500/50 rounded-2xl text-purple-200 text-sm md:text-base animate-in zoom-in-95 flex gap-4 relative z-10 shadow-[inset_0_0_30px_rgba(168,85,247,0.2)]">
                          <Sparkles className="shrink-0 mt-1 text-purple-400 animate-pulse" size={24}/>
                          <div><span className="text-[10px] md:text-xs uppercase tracking-widest text-purple-400/80 block mb-1">La pitonisa susurra entre el humo sagrado...</span><strong className="text-[15px] md:text-lg font-serif font-medium">{currentLevel.oracleHint}</strong></div>
                        </div>
                      )}
                      {feedback && (
                        <div className={`mt-8 p-6 rounded-2xl flex items-center gap-4 animate-in zoom-in-95 border-2 relative z-10 shadow-2xl ${feedback.type === 'success' ? 'bg-green-950 border-green-500 text-green-200' : 'bg-red-950 border-red-500 text-red-200'}`}>
                          {feedback.type === 'success' ? <Sparkles className="shrink-0 text-green-400" size={32}/> : <AlertTriangle className="shrink-0 text-red-400" size={32}/>}
                          <span className="font-black text-lg md:text-xl tracking-wide">{feedback.text}</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {gameState === 'victory' && (
                  <div className="flex flex-col items-center justify-center py-10 md:py-20 animate-in zoom-in duration-1000">
                    <div className="w-48 h-48 md:w-64 md:h-64 relative mb-12">
                      <div className="absolute inset-0 bg-amber-500 blur-[80px] opacity-50 rounded-full animate-pulse"></div>
                      <div className="relative w-full h-full rounded-full border-[8px] border-amber-400 flex items-center justify-center bg-slate-900 shadow-[0_0_80px_rgba(217,119,6,0.8)] z-10 overflow-hidden">
                        <Crown size={100} className="text-amber-400 drop-shadow-2xl relative z-20" />
                      </div>
                    </div>
                    <h2 className="text-5xl md:text-8xl font-black text-center mb-6 text-transparent bg-clip-text bg-gradient-to-b from-amber-200 to-amber-600 drop-shadow-[0_0_20px_rgba(217,119,6,0.8)] tracking-tighter uppercase">¡REINAS EN ÍTACA!</h2>
                    <div className="bg-slate-900/90 border-2 border-amber-600/50 p-8 md:p-14 rounded-3xl shadow-2xl max-w-4xl text-center leading-relaxed backdrop-blur-md">
                      <p className="mb-6 text-xl md:text-2xl text-slate-200 font-medium">Habéis cruzado el mar Egeo, burlado a Poseidón, masacrado a los pretendientes y recuperado el amor de Penélope. La gramática y la sintaxis ya no tienen secretos para vosotros.</p>
                      <p className="mb-10 text-amber-300/90 italic font-serif text-xl md:text-2xl border-t border-b border-amber-900/50 py-6">"¡Cantad, Musas, la excelencia morfológica de los alumnos de Bachillerato!"</p>
                      <div className="mb-12 bg-slate-950/80 p-8 rounded-3xl border border-slate-700 shadow-inner">
                        <h4 className="text-amber-500 font-black mb-8 uppercase tracking-[0.3em] text-sm md:text-base flex items-center justify-center gap-3 border-b border-slate-700 pb-4"><Star size={20}/> Reliquias Épicas Adquiridas <Star size={20}/></h4>
                        <div className="flex flex-wrap justify-center gap-4 md:gap-6">
                          {inventory.map((item, i) => (
                            <div key={i} className="flex flex-col items-center gap-3 bg-slate-800/90 p-4 md:p-5 rounded-2xl border border-slate-600 shadow-[0_10px_20px_rgba(0,0,0,0.4)] min-w-[120px] hover:-translate-y-2 hover:shadow-[0_15px_30px_rgba(217,119,6,0.3)] transition-all">
                              <span className="text-4xl md:text-5xl drop-shadow-xl">{item.icon}</span>
                              <span className="text-xs md:text-sm font-bold text-slate-200 text-center uppercase">{item.name}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      <button onClick={() => window.location.reload()} className="bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-black px-12 py-5 rounded-2xl transition-all shadow-[0_0_30px_rgba(217,119,6,0.5)] hover:shadow-[0_0_40px_rgba(217,119,6,0.7)] hover:scale-105 active:scale-95 w-full md:w-auto text-lg md:text-xl">Volver a Desafiar a los Dioses</button>
                    </div>
                  </div>
                )}
              </main>

              {gameState === 'playing' && (
                <div className="fixed bottom-0 left-0 right-0 bg-slate-950/95 backdrop-blur-md border-t border-slate-800 p-3 z-30 shadow-[0_-10px_50px_rgba(0,0,0,0.8)]">
                  <div className="max-w-5xl mx-auto flex items-center gap-4 overflow-x-auto no-scrollbar pb-1">
                    <span className="text-amber-500 font-black uppercase tracking-[0.2em] text-xs shrink-0 flex items-center gap-2 border-r border-slate-700 pr-4"><Key size={18}/> Botín:</span>
                    {inventory.length === 0 ? (
                      <span className="text-slate-500 text-sm font-medium italic px-2">Vuestras manos están vacías</span>
                    ) : (
                      inventory.map((item, idx) => (
                        <div key={idx} className="flex items-center gap-2 bg-slate-900 px-4 py-2 rounded-xl border border-amber-900/50 shrink-0 shadow-md animate-in zoom-in hover:bg-slate-800 transition-colors">
                          <span className="text-xl drop-shadow-md">{item.icon}</span><span className="text-xs font-bold text-amber-50 uppercase tracking-wide">{item.name}</span>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              )}

              {isCodexOpen && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-2 sm:p-6 bg-slate-950/95 backdrop-blur-md animate-in fade-in duration-200">
                  <div className="bg-slate-900 border-2 border-amber-500/50 rounded-3xl w-full max-w-7xl h-[95vh] md:h-[90vh] flex flex-col shadow-[0_0_80px_rgba(217,119,6,0.3)] overflow-hidden">
                    <div className="flex justify-between items-center p-5 border-b border-slate-800 bg-slate-950">
                      <h2 className="text-xl md:text-2xl font-black text-amber-500 flex items-center gap-3 uppercase tracking-widest"><BookOpen className="text-amber-400" size={28}/> Biblioteca Filológica Mayor</h2>
                      <button onClick={() => setIsCodexOpen(false)} className="text-slate-400 hover:text-red-400 bg-slate-800 hover:bg-slate-700 p-2.5 rounded-xl transition-colors border border-slate-700 shadow-sm"><XCircle size={28} /></button>
                    </div>
                    <div className="flex flex-col md:flex-row flex-1 overflow-hidden">
                      <div className="w-full md:w-1/3 lg:w-1/4 bg-slate-950 border-r border-slate-800 p-4 overflow-y-auto flex md:flex-col gap-3 shrink-0 scroll-smooth custom-scrollbar">
                        {Object.keys(CODEX_DATA).map(key => {
                          const isUnlocked = unlockedCodex.includes(key); const isActive = activeTopic === key;
                          return (
                            <button key={key} onClick={() => isUnlocked && setActiveTopic(key)} className={`text-left px-5 py-4 rounded-2xl text-sm md:text-base transition-all shrink-0 border-2 relative ${isActive ? 'bg-slate-800 border-amber-500 text-amber-400 shadow-[0_0_15px_rgba(217,119,6,0.2)] md:translate-x-2' : isUnlocked ? 'bg-slate-900 border-slate-800 hover:border-slate-600 text-slate-300 hover:bg-slate-800/50' : 'opacity-40 cursor-not-allowed bg-slate-950 border-slate-900 text-slate-600'}`}>
                              <div className="flex flex-col"><span className="text-[10px] md:text-xs uppercase tracking-[0.2em] text-slate-500 mb-1.5 font-bold">{CODEX_DATA[key].category}</span><div className="flex items-center gap-3"><span className={isActive ? "text-amber-500" : isUnlocked ? "text-slate-400" : "text-slate-700"}>{isUnlocked ? CODEX_DATA[key].icon : <AlertTriangle size={20} />}</span><span className="font-black truncate">{CODEX_DATA[key].title}</span></div></div>
                              {isActive && <div className="absolute left-0 top-1/2 -translate-y-1/2 w-2 h-1/2 bg-amber-500 rounded-r-full shadow-[0_0_10px_rgba(217,119,6,1)]"></div>}
                            </button>
                          );
                        })}
                      </div>
                      <div className="flex-1 p-5 md:p-10 overflow-y-auto scroll-smooth bg-[#0f172a] relative custom-scrollbar">
                        <div className="absolute inset-0 opacity-5 pointer-events-none flex items-center justify-center"><Scroll size={600} /></div>
                        {activeTopic && CODEX_DATA[activeTopic] && (
                          <div className="relative z-10 animate-in fade-in slide-in-from-right-8 duration-300 max-w-4xl mx-auto">
                            <h3 className="text-3xl md:text-4xl font-black text-slate-100 mb-8 drop-shadow-sm flex items-center gap-4 border-b border-slate-800 pb-6"><span className="text-amber-500 p-3 bg-slate-800 rounded-2xl border border-slate-700 shadow-inner">{CODEX_DATA[activeTopic].icon}</span> {CODEX_DATA[activeTopic].title}</h3>
                            <div className="text-slate-200">{CODEX_DATA[activeTopic].content}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
</html>
